  note: >-
    ATK is the creature's attack plus the hero's attack, DEF is the
    creature's defense plus the hero's defense. Type bonuses and penalties
    are summed first; at least 10% of the damage must remain after them.
    The result always deals at least 1 damage. Attack modes are built from
    the selected unit's abilities: a shooter's ranged attack loses 10% for
    every hex beyond three (up to −50%; Sharpshooter shoots with no
    penalty), its melee attack deals half damage (except Duelist),
    fighting styles give ×0.5. Active abilities with their own damage
    (pure or magic) follow the formula from their description: ATK/DEF,
    modifiers, range and luck do not affect them; magic damage is reduced
    by the target's Magic Defense, pure damage is not reduced by anything.
    The target's permanent defensive abilities (Ranged Defense, Melee
    Defense, Disdain) automatically reduce damage of the matching attack
    type. Retaliation is set automatically: ranged attacks, long-reach
    attacks and Swift Strike do not provoke it, and the checkbox can be
    toggled manually. Deaths: the top unit with partial health dies first,
    then the damage is divided by full health (rounded down); the
    calculated number is not capped by the stack size. “Full stack: in N
    strikes” shows how many strikes with that row's damage it takes to
    bring down the defending stack's total health (bounds follow the
    maximum and minimum damage). Retaliation: the defender's survivors are
    computed from the attack damage (total health minus damage, creature
    count rounded up), then they strike back with the usual formula using
    their own damage and the modifier (20 + defender's ATK) / (20 +
    attacker's DEF); luck, range and attack modifiers do not affect
    retaliation. The second strike (Double Strike, or Double Shot when
    shooting) is dealt by the attackers surviving the retaliation to the
    remainder of the defending stack; luck applies to both strikes
    equally, although in the game it rolls for each strike separately.
    Data comes from the game's official wiki; the game is in early access,
    numbers may change.
