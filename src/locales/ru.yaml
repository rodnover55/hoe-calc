  note: >-
    ATK — атака существа плюс атака героя, DEF — защита существа плюс
    защита героя. Типовые бонусы и штрафы сначала суммируются; после них
    должно остаться хотя бы 10% урона. Итог всегда наносит минимум 1
    урона. Режимы атаки строятся по способностям выбранного юнита: у
    стрелка дальняя атака теряет 10% за каждый гекс сверх трёх (максимум
    −50%; «Снайпер» стреляет без штрафа), ближняя атака идёт с половинным
    уроном (кроме «Дуэлянта»), боевые стойки дают ×0.5. Активные
    способности с собственным уроном (чистым или магическим) считаются по
    формуле из описания: АТК/ЗЩТ, модификаторы, дальность и удача на них
    не действуют; магический урон снижает «Защита от магии» цели, чистый
    не снижается ничем. Постоянные защитные способности цели («Защита от
    выстрелов», «Защита в ближнем бою», «Презрение») уменьшают урон
    соответствующего типа атаки автоматически. Ответный удар
    проставляется автоматически: дальняя атака, атака через гекс и
    «Стремительный удар» ответа не провоцируют, галочку можно переключить
    вручную. Погибшие: первым гибнет верхний юнит с неполным здоровьем,
    дальше урон делится на полное здоровье (округление вниз); расчётное
    число не ограничено размером отряда. «Весь отряд: за N ударов» —
    сколько ударов с уроном строки нужно, чтобы выбить суммарное здоровье
    отряда защитника (границы — по максимальному и минимальному урону).
    Ответный удар: по урону атаки считаются выжившие существа защитника
    (суммарное здоровье минус урон, округление числа существ вверх),
    затем они бьют по обычной формуле со своим уроном и модификатором
    (20 + ATK защитника) / (20 + DEF атакующего); удача, дальность и
    модификаторы атаки на ответ не влияют. Второй удар («Двойной удар»,
    при стрельбе — «Двойной выстрел») наносят выжившие после ответа
    атакующие по остатку отряда защитника; удача действует на оба удара
    одинаково, хотя в игре она выпадает на каждый удар отдельно. Данные —
    официальная вики игры; игра в раннем доступе, цифры могут меняться.
