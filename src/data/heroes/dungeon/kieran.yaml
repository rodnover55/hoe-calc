id: kieran
name: "Киран"
nameEn: "Kieran"
faction: dungeon
class: "Владыка"
classEn: "Overlord"
image: heroes/dungeon/kieran.webp
stats:
  attack: 2
  defense: 2
  spellPower: 1
  knowledge: 2
specialization:
  id: troglodytes
  name: "Троглодиты"
  nameEn: "Troglodytes"
  description: "Слепой народ — Прирост троглодитов в ваших городах увеличивается на 1. Под его командованием троглодиты получают +1 к скорости, +1 к инициативе и +20% ОЗ. Их атака и защита увеличиваются на 1 за каждые 3 уровня героя, а вражеские троглодиты теряют столько же."
  descriptionEn: "The Blind Folk - Troglodytes growth in your cities increases by 1. Under his command, Troglodytes gain 1 Speed, 1 Initiative, and 20% HP. Their Attack and Defence increase by 1 for every 3 hero levels, and enemy Troglodytes lose an equal amount of Attack and Defence."
skills:
  - id: basic_triumvirates_strength
    name: "Основы силы Триумвирата"
    nameEn: "Basic Triumvirate’s Strength"
    description: "Раз за раунд позволяет герою выбрать одну из трёх боевых стоек. Каждая стойка даёт +2 к одной из характеристик героя."
    descriptionEn: "Once per round, the hero can activate one of the three Stances in battle. The active Stance grants the hero +2 to the Stance’s corresponding attribute."
  - id: basic_tactics
    name: "Основы тактики"
    nameEn: "Basic Tactics"
    description: "Увеличивает область расстановки в тактической фазе до 3 рядов. Если противник тоже владеет «Тактикой», его область снижается на 1 ряд(а)."
    descriptionEn: "In the Tactics Phase, creatures can be placed within a 3‑line area. If the enemy also knows “Tactics”, their area of placement reduces by 1 line(s)."
source: https://www.olden-era.com/ru/heroes/kieran
