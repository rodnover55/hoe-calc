  description: "Логово Бальтазара — Прирост минотавров в ваших городах увеличивается на 1. Под его командованием минотавры получают +1 к скорости, +1 к инициативе и +20% ОЗ. Их атака и защита увеличиваются на 1 за каждые 3 уровня героя, а вражеские минотавры теряют столько же."
  descriptionEn: "Balthazar's Lair - Minotaurs growth in your cities increases by 1. Under his command, Minotaurs gain 1 Speed, 1 Initiative, and 20% HP. Their Attack and Defence increase by 1 for every 3 hero levels, and enemy Minotaurs lose an equal amount of Attack and Defence."
