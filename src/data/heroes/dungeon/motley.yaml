  description: "Танец смерти — Прирост ониксовых танцовщиц в ваших городах увеличивается на 1. Под её командованием ониксовые танцовщицы получают +1 к скорости, +1 к инициативе и +20% ОЗ. Их атака и защита увеличиваются на 1 за каждые 3 уровня героя, а вражеские теряют столько же."
  descriptionEn: "Danse Macabre - Onyx Dancers growth in your cities increases by 1. Under her command, Onyx Dancers gain 1 Speed, 1 Initiative, and 20% HP. Their Attack and Defence increase by 1 for every 3 hero levels, and enemy Onyx Dancers lose an equal amount of Attack and Defence."
