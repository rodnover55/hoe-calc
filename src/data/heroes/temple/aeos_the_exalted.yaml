id: aeos_the_exalted
name: "Эос Возвышенный"
nameEn: "Aeos the Exalted"
faction: temple
class: "Рыцарь"
classEn: "Knight"
image: heroes/temple/aeos_the_exalted.webp
stats:
  attack: 2
  defense: 3
  spellPower: 1
  knowledge: 1
specialization:
  id: leadership
  name: "Лидерство"
  nameEn: "Leadership"
  description: "Вдохновляющее присутствие — Увеличивает морал дружественных существ на 1 и даёт +1% шанс за каждый пункт морали, что дружественное существо получит дополнительный ход. За каждые 6 уровня этот бонус увеличивается на 1%."
  descriptionEn: "Rousing Presence - Increases Morale of friendly creatures by 1 and gives +1% chance per Morale point that a friendly creature takes an additional turn. For every 6 levels, this bonus increases by 1%."
skills:
  - id: basic_ascension
    name: "Основы праведности"
    nameEn: "Basic Righteousness"
    description: "Все смерти в бою вершатся во имя героя! Каждый раз, когда дружественный отряд убивает противника или погибает, атака, защита, сила магии и знания героя повышаются на 1 на протяжении двух раундов. Эффект суммируется."
    descriptionEn: "All who fall in battle do so in the hero’s name! Whenever a friendly creature dies or kills an enemy, the hero’s Attack, Defense, Spell Power and Knowledge increase by 1 for two rounds. This effect is stackable."
  - id: basic_leadership
    name: "Основы лидерства"
    nameEn: "Basic Leadership"
    description: "Герой получает +1 к боевому духу."
    descriptionEn: "The hero gains 1 Morale."
source: https://www.olden-era.com/ru/heroes/aeos_the_exalted
