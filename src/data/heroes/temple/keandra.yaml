id: keandra
name: "Кеандра"
nameEn: "Keandra"
faction: temple
class: "Рыцарь"
classEn: "Knight"
image: heroes/temple/keandra.webp
stats:
  attack: 2
  defense: 3
  spellPower: 1
  knowledge: 1
specialization:
  id: cavalry
  name: "Кавалерия"
  nameEn: "Cavalry"
  description: "Турнирный боец — Прирост кавалерии в ваших городах увеличивается на 1. Под её командованием кавалерия получает +1 к скорости, +1 к инициативе и +20% ОЗ. Их атака и защита увеличиваются на 1 за каждые 3 уровня героя, а вражеская теряет столько же."
  descriptionEn: "Jouster - Cavalry growth in your cities increases by 1. Under her command, Cavalry gain 1 Speed, 1 Initiative, and 20% HP. Their Attack and Defence increase by 1 for every 3 hero levels, and enemy Cavalry lose an equal amount of Attack and Defence."
skills:
  - id: basic_ascension
    name: "Основы праведности"
    nameEn: "Basic Righteousness"
    description: "Все смерти в бою вершатся во имя героя! Каждый раз, когда дружественный отряд убивает противника или погибает, атака, защита, сила магии и знания героя повышаются на 1 на протяжении двух раундов. Эффект суммируется."
    descriptionEn: "All who fall in battle do so in the hero’s name! Whenever a friendly creature dies or kills an enemy, the hero’s Attack, Defense, Spell Power and Knowledge increase by 1 for two rounds. This effect is stackable."
  - id: basic_offence
    name: "Основы нападения"
    nameEn: "Basic Offense"
    description: "Дружественные существа наносят +10% урона обычными атаками."
    descriptionEn: "Friendly creatures’ basic attacks deal +10% Damage."
source: https://www.olden-era.com/ru/heroes/keandra
