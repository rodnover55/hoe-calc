id: anastasia_the_meek
name: "Анастасия Кроткая"
nameEn: "Anastasia the Meek"
faction: temple
class: "Клирик"
classEn: "Cleric"
image: heroes/temple/anastasia_the_meek.webp
stats:
  attack: 1
  defense: 1
  spellPower: 2
  knowledge: 3
specialization:
  id: arina_s_touch
  name: "Прикосновение Арины"
  nameEn: "Arina's Touch"
  description: "Гимн Арине — Начинает с заклинания «Мастерское прикосновение Арины». Эта версия заклинания увеличивает скорость цели на 1. При произнесении заклинания эффективная сила магии увеличивается на 1 за каждые 2 уровня героя."
  descriptionEn: "Hymn to Arina - Starts with the “Masterful Arina’s Touch” spell. This version of the spell increases target´s Speed by 1. While casting this spell, effective Spell Power is increased by 1 for every 2 hero levels."
skills:
  - id: basic_ascension
    name: "Основы праведности"
    nameEn: "Basic Righteousness"
    description: "Все смерти в бою вершатся во имя героя! Каждый раз, когда дружественный отряд убивает противника или погибает, атака, защита, сила магии и знания героя повышаются на 1 на протяжении двух раундов. Эффект суммируется."
    descriptionEn: "All who fall in battle do so in the hero’s name! Whenever a friendly creature dies or kills an enemy, the hero’s Attack, Defense, Spell Power and Knowledge increase by 1 for two rounds. This effect is stackable."
  - id: basic_thaumaturgy
    name: "Основы чародейства"
    nameEn: "Basic Thaumaturgy"
    description: "Герой может использовать книгу магии в бою ещё один раз, применяя при этом заклинание ещё неиспользованной школы магии. При каждом использовании стоимость заклинания повышается на 100%."
    descriptionEn: "The hero can use the Spellbook one more time per battle round, but only to cast a spell of a Magic School that hasn’t been used this round. Spells cost +100% mana for each use after the first."
source: https://www.olden-era.com/ru/heroes/anastasia_the_meek
