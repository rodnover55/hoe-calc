id: lia_the_untethered_one
name: "Лия Освобождённая"
nameEn: "Lia the Untethered One"
faction: temple
class: "Клирик"
classEn: "Cleric"
image: heroes/temple/lia_the_untethered_one.webp
stats:
  attack: 1
  defense: 1
  spellPower: 2
  knowledge: 3
specialization:
  id: daylight_magic
  name: "Магия дневного света"
  nameEn: "Daylight Magic"
  description: "Излучающие знания — Получает +1 уровень ко всем заклинаниям дневного света, плюс 1 за каждые 10 уровней героя, и может использовать их в бою без ограничений. Вражеский герой не может произносить заклинания дневного света."
  descriptionEn: "Radiating Knowledge - Receives +1 level to all Daylight spells, plus 1 more for every 10 hero levels, and can use them in battle without limits. Enemy hero cannot cast Daylight spells."
skills:
  - id: basic_ascension
    name: "Основы праведности"
    nameEn: "Basic Righteousness"
    description: "Все смерти в бою вершатся во имя героя! Каждый раз, когда дружественный отряд убивает противника или погибает, атака, защита, сила магии и знания героя повышаются на 1 на протяжении двух раундов. Эффект суммируется."
    descriptionEn: "All who fall in battle do so in the hero’s name! Whenever a friendly creature dies or kills an enemy, the hero’s Attack, Defense, Spell Power and Knowledge increase by 1 for two rounds. This effect is stackable."
  - id: basic_daylight_magic
    name: "Basic Daylight Magic"
    nameEn: "Basic Daylight Magic"
    description: "The hero can learn Daylight spells up to tier 5."
    descriptionEn: "The hero can learn Daylight spells up to tier 5."
source: https://www.olden-era.com/ru/heroes/lia_the_untethered_one
