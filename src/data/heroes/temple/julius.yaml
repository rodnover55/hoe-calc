id: julius
name: "Юлий"
nameEn: "Julius"
faction: temple
class: "Клирик"
classEn: "Cleric"
image: heroes/temple/julius.webp
stats:
  attack: 1
  defense: 1
  spellPower: 2
  knowledge: 3
specialization:
  id: healing_water
  name: "Целебная вода"
  nameEn: "Healing Water"
  description: "Сострадательный целитель — Начинает с заклинания «Мастерская целебная вода». Эта версия заклинания рассеивает все отрицательные эффекты с дружественных существ. При произнесении заклинания эффективная сила магии увеличивается на 1 за каждые 2 уровня героя."
  descriptionEn: "Compassionate Healer - Starts with the “Masterful Healing Water” spell. This version of the spell dispels all negative effects from friendly creatures. While casting this spell, effective Spell Power is increased by 1 for every 2 hero levels."
skills:
  - id: basic_ascension
    name: "Основы праведности"
    nameEn: "Basic Righteousness"
    description: "Все смерти в бою вершатся во имя героя! Каждый раз, когда дружественный отряд убивает противника или погибает, атака, защита, сила магии и знания героя повышаются на 1 на протяжении двух раундов. Эффект суммируется."
    descriptionEn: "All who fall in battle do so in the hero’s name! Whenever a friendly creature dies or kills an enemy, the hero’s Attack, Defense, Spell Power and Knowledge increase by 1 for two rounds. This effect is stackable."
  - id: basic_defence
    name: "Основы обороны"
    nameEn: "Basic Defense"
    description: "Дружественные существа получают –10% урона от обычных атак."
    descriptionEn: "Friendly creatures take –10% Damage from basic attacks."
source: https://www.olden-era.com/ru/heroes/julius
