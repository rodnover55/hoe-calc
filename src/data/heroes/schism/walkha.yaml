specialization:
  id: primal_magic
  name: "Изначальная магия"
  nameEn: "Primal Magic"
  description: "Изначальное плетение — Получает +1 уровень ко всем изначальным заклинаниям, плюс 1 за каждые 10 уровней героя, и может использовать их в бою без ограничений. Вражеский герой не может произносить изначальные заклинания."
