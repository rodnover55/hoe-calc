id: the_eye_collective
name: "Коллективный Глаз"
nameEn: "The Eye Collective"
faction: schism
class: "Говорящий с разломами"
classEn: "Riftspeaker"
image: heroes/schism/the_eye_collective.webp
stats:
  attack: 1
  defense: 1
  spellPower: 3
  knowledge: 2
specialization:
  id: grand_shothes
  name: "Великие Шоты"
  nameEn: "Grand Shothes"
  description: "Посланник разлома — Прирост великих Шотов в ваших городах увеличивается на 1. Под его командованием великие Шоты получают +1 к скорости, +1 к инициативе и +20% ОЗ. Их атака и защита увеличиваются на 1 за каждые 3 уровня героя, а вражеские теряют столько же."
  descriptionEn: "Rift's Envoy - Grand Shoth growth in your cities increases by 1. Under its command, Grand Shoth gain 1 Speed, 1 Initiative, and 20% HP. Their Attack and Defence increase by 1 for every 3 hero levels, and enemy Grand Shoth lose an equal amount of Attack and Defence."
skills:
  - id: basic_abyssal_communion
    name: "Основы Причастия к Бездне"
    nameEn: "Basic Abyssal Communion"
    description: "Герой получает +1 к Причастию при победе в бою (но не более 3). Каждое утро Причастие сокращается вдвое. +2.5% существ до конца боя за уровень Причастия."
    descriptionEn: "After each battle victory, the hero increases their Communion level by 1 (up to a max. of 3). Each level increases the number of friendly units by 2.5% until the end of the battle. Each morning, all heroes’ Communion level is halved."
  - id: basic_leadership
    name: "Основы лидерства"
    nameEn: "Basic Leadership"
    description: "Герой получает +1 к боевому духу."
    descriptionEn: "The hero gains 1 Morale."
source: https://www.olden-era.com/ru/heroes/the_eye_collective
