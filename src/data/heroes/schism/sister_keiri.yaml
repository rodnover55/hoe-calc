id: sister_keiri
name: "Сестра Кейри"
nameEn: "Sister Keiri"
faction: schism
class: "Говорящий с разломами"
classEn: "Riftspeaker"
image: heroes/schism/sister_keiri.webp
stats:
  attack: 1
  defense: 1
  spellPower: 3
  knowledge: 2
specialization:
  id: umbral_grip
  name: "Теневая хватка"
  nameEn: "Umbral Grip"
  description: "Маска луны — Начинает с заклинания «Мастерская теневая хватка». Эта версия заклинания наносит +100% урона. При произнесении заклинания эффективная сила магии увеличивается на 1 за каждые 2 уровня героя."
  descriptionEn: "Mask of the Moon - Starts with the “Masterful Umbral Grip” spell. This version of the spell deals +100% Damage. While casting this spell, effective Spell Power is increased by 1 for every 2 hero levels."
skills:
  - id: basic_abyssal_communion
    name: "Основы Причастия к Бездне"
    nameEn: "Basic Abyssal Communion"
    description: "Герой получает +1 к Причастию при победе в бою (но не более 3). Каждое утро Причастие сокращается вдвое. +2.5% существ до конца боя за уровень Причастия."
    descriptionEn: "After each battle victory, the hero increases their Communion level by 1 (up to a max. of 3). Each level increases the number of friendly units by 2.5% until the end of the battle. Each morning, all heroes’ Communion level is halved."
  - id: basic_nightshade_magic
    name: "Основы магии ночи"
    nameEn: "Basic Nightshade Magic"
    description: "Герой может изучать заклинания ночи 5‑го ранга и ниже."
    descriptionEn: "The hero can learn Nightshade spells up to tier 5."
source: https://www.olden-era.com/ru/heroes/sister_keiri
