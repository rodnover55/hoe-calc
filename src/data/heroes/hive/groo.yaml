id: groo
name: "Гру"
nameEn: "Groo"
faction: hive
class: "Herald"
classEn: "Herald"
image: heroes/hive/groo.webp
stats:
  attack: 1
  defense: 0
  spellPower: 4
  knowledge: 2
specialization:
  id: son_of_all_mothers
  name: "Сын всех матерей"
  nameEn: "Son of All Mothers"
  description: "Повышает прирост королев роя в ваших городах на 1. В его армии они получают +1 к скорости и инициативе, +20% к здоровью. Также они получают +1 к атаке и защите за уровни героя: каждые 3. Королевы роя противника теряют такое же количество атаки и защиты."
  descriptionEn: "Hive Queen growth in your cities increases by 1. Under his command, Hive Queens gain 1 Speed, 1 Initiative, and 20% HP. Their Attack and Defense increase by 1 for every 3 hero levels, and enemy Hive Queens lose an equal amount of Attack and Defense."
skills:
  - id: basic_summon_swarm
    name: "Основы призыва роя"
    nameEn: "Basic Summon Swarm"
    description: "Раз за раунд создаёт на поле боя кладку яиц. В начале следующего раунда из неё вылупится отряд огненных личинок. Здоровье отряда составляет 8% от здоровья дружественных порождений Роя, а сила их способностей зависит от уровня героя."
    descriptionEn: "Once per round, lays eggs on the battlefield. At the start of next round, they spawn a stack of Fire Larvae. The stack has 8% of the total HP of all Hive Spawns in its army, and the strength of its abilities scales with the hero’s level."
  - id: basic_intelligence
    name: "Основы мудрости"
    nameEn: "Basic Wisdom"
    description: "Герой может изучать заклинания до 3‑го ранга, даже не владея навыком соответствующей школы магии."
    descriptionEn: "The hero can learn up to tier‑3 spells without knowing the corresponding Magic School skill."
source: https://www.olden-era.com/ru/heroes/groo
