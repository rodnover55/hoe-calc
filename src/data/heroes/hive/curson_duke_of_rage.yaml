specialization:
  id: intimidating_strike
  name: "Устрашающий удар"
  nameEn: "Intimidating Strike"
  description: "Его удар героя наносит +10 базового урона и ещё +5 за уровни героя: каждые 6. Дополнительно снижает инициативу цели на 1 до конца боя. Эффект суммируется."
