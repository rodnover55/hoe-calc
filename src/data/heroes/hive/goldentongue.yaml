nameEn: "Goldentongue"
faction: hive
class: "Enforcer"
classEn: "Enforcer"
image: heroes/hive/goldentongue.webp
stats:
  attack: 4
  defense: 0
  spellPower: 2
  knowledge: 1
specialization:
  id: rousing_presence
  name: "Вдохновитель"
  nameEn: "Rousing Presence"
  description: "Повышает боевой дух дружественных существ на 1 и даёт за каждую единицу боевого духа +1% к вероятности выполнения дополнительного хода. Этот бонус повышается на 1% за уровни героя: каждые 6."
  descriptionEn: "Friendly creatures have +1 Morale. They also have a higher chance of triggering the positive Morale effect: +1% chance per Morale point. For every 6 levels, this bonus increases by 1%."
skills:
  - id: basic_summon_swarm
    name: "Основы призыва роя"
    nameEn: "Basic Summon Swarm"
    description: "Раз за раунд создаёт на поле боя кладку яиц. В начале следующего раунда из неё вылупится отряд огненных личинок. Здоровье отряда составляет 8% от здоровья дружественных порождений Роя, а сила их способностей зависит от уровня героя."
    descriptionEn: "Once per round, lays eggs on the battlefield. At the start of next round, they spawn a stack of Fire Larvae. The stack has 8% of the total HP of all Hive Spawns in its army, and the strength of its abilities scales with the hero’s level."
  - id: basic_leadership
    name: "Основы лидерства"
    nameEn: "Basic Leadership"
    description: "Герой получает +1 к боевому духу."
    descriptionEn: "The hero gains 1 Morale."
