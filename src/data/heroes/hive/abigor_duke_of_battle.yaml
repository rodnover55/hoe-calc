id: abigor_duke_of_battle
name: "Абигор, герцог битвы"
nameEn: "Abigor, Duke of Battle"
faction: hive
class: "Enforcer"
classEn: "Enforcer"
image: heroes/hive/abigor_duke_of_battle.webp
stats:
  attack: 4
  defense: 0
  spellPower: 2
  knowledge: 1
specialization:
  id: chessmaster
  name: "Гроссмейстер"
  nameEn: "Chessmaster"
  description: "Получает +1 гекс к радиусу расстановки существ в тактической фазе. Существа в его армии получают +1 к инициативе за уровни героя: каждые 6."
  descriptionEn: "In the Tactics Phase, he has +1 hex to the creature placement range. Creatures in his army gain 1 Initiative for every 6 hero level(s)."
skills:
  - id: basic_summon_swarm
    name: "Основы призыва роя"
    nameEn: "Basic Summon Swarm"
    description: "Раз за раунд создаёт на поле боя кладку яиц. В начале следующего раунда из неё вылупится отряд огненных личинок. Здоровье отряда составляет 8% от здоровья дружественных порождений Роя, а сила их способностей зависит от уровня героя."
    descriptionEn: "Once per round, lays eggs on the battlefield. At the start of next round, they spawn a stack of Fire Larvae. The stack has 8% of the total HP of all Hive Spawns in its army, and the strength of its abilities scales with the hero’s level."
  - id: basic_tactics
    name: "Основы тактики"
    nameEn: "Basic Tactics"
    description: "Увеличивает область расстановки в тактической фазе до 3 рядов. Если противник тоже владеет «Тактикой», его область снижается на 1 ряд(а)."
    descriptionEn: "In the Tactics Phase, creatures can be placed within a 3‑line area. If the enemy also knows “Tactics”, their area of placement reduces by 1 line(s)."
source: https://www.olden-era.com/ru/heroes/abigor_duke_of_battle
