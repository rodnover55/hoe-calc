specialization:
  id: resistant_to_elements
  name: "Сопротивляется стихиям"
  nameEn: "Resistant to Elements"
  description: "Неуязвим для отрицательных эффектов в бою и на карте приключений. Существа в его армии получают –10% магического урона и ещё –2% за уровни героя: каждые 3."
  descriptionEn: "He is immune to negative effects in battles and on the global map. His creatures take –10% Magic Damage, and an additional –2% for every 3 hero level(s)."
skills:
  - id: basic_summon_swarm
    name: "Основы призыва роя"
    nameEn: "Basic Summon Swarm"
    description: "Раз за раунд создаёт на поле боя кладку яиц. В начале следующего раунда из неё вылупится отряд огненных личинок. Здоровье отряда составляет 8% от здоровья дружественных порождений Роя, а сила их способностей зависит от уровня героя."
    descriptionEn: "Once per round, lays eggs on the battlefield. At the start of next round, they spawn a stack of Fire Larvae. The stack has 8% of the total HP of all Hive Spawns in its army, and the strength of its abilities scales with the hero’s level."
  - id: basic_resistance
    name: "Основы сопротивления"
    nameEn: "Basic Resistance"
    description: "Дружественные существа получают –15% магического урона."
    descriptionEn: "Friendly creatures take –15% Magic Damage."
