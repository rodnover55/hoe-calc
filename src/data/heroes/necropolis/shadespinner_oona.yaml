    descriptionEn: "After winning a battle, raises 10% of the strongest enemy stack as friendly Undead of the same tier. This requires Necromantic Energy, which stores up to 3000 and refills each week."
  - id: basic_nightshade_magic
    name: "Основы магии ночи"
    nameEn: "Basic Nightshade Magic"
    description: "Герой может изучать заклинания ночи 5‑го ранга и ниже."
    descriptionEn: "The hero can learn Nightshade spells up to tier 5."
