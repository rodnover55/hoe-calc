  name: "Магия ночной тени"
  nameEn: "Nightshade Magic"
  description: "Мастерство теней — Получает +1 уровень ко всем заклинаниям ночной тени, плюс 1 за каждые 10 уровней героя, и может использовать их в бою без ограничений. Вражеский герой не может произносить заклинания ночной тени."
