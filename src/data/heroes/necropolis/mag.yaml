specialization:
  id: arcane_magic
  name: "Тайная магия"
  nameEn: "Arcane Magic"
  description: "Владычество тайной магии — Получает +1 уровень ко всем заклинаниям тайной магии, плюс 1 за каждые 10 уровней героя, и может использовать их в бою без ограничений. Вражеский герой не может произносить заклинания тайной магии."
