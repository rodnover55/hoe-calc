id: natalida
name: "Наталида"
nameEn: "Natalida"
faction: necropolis
class: "Рыцарь смерти"
classEn: "Death Knight"
image: heroes/necropolis/natalida.webp
stats:
  attack: 3
  defense: 1
  spellPower: 1
  knowledge: 2
specialization:
  id: undead_pets
  name: "Питомцы-нежить"
  nameEn: "Undead pets"
  description: "Часть стаи — Прирост питомцев-нежити в ваших городах увеличивается на 2. Под её командованием питомцы-нежить получают +1 к скорости, +1 к инициативе и +20% ОЗ. Их атака и защита увеличиваются на 1 за каждые 3 уровня героя, а вражеские теряют столько же."
  descriptionEn: "Part of a Pack - Undead Pets growth in your cities increases by 2. Under her command, Undead Pets gain 1 Speed, 1 Initiative, and 20% HP. Their Attack and Defence increase by 1 for every 3 hero levels, and enemy Undead Pets lose an equal amount of Attack and Defence."
skills:
  - id: basic_necromancy
    name: "Основы некромантии"
    nameEn: "Basic Necromancy"
    description: "После победы в бою обращает 10% самого сильного отряда противника в дружественную нежить того же ранга, расходуя некротическую энергию. Она накапливается до 3000 и восполняется каждую неделю."
    descriptionEn: "After winning a battle, raises 10% of the strongest enemy stack as friendly Undead of the same tier. This requires Necromantic Energy, which stores up to 3000 and refills each week."
  - id: basic_scouting
    name: "Основы разведки"
    nameEn: "Basic Scouting"
    description: "Герой получает +1 к радиусу обзора."
    descriptionEn: "The hero gains 1 sight radius."
source: https://www.olden-era.com/ru/heroes/natalida
