id: lord_rufus
name: "Лорд Руфус"
nameEn: "Lord Rufus"
faction: necropolis
class: "Некромант"
classEn: "Necromancer"
image: heroes/necropolis/lord_rufus.webp
stats:
  attack: 1
  defense: 0
  spellPower: 2
  knowledge: 4
specialization:
  id: rewind_life
  name: "Перемотка жизни"
  nameEn: "Rewind life"
  description: "Томная ностальгия — Начинает с заклинания «Мастерская перемотка жизни». Эта версия заклинания может воскрешать юниты сверх их исходного количества. При произнесении заклинания эффективная сила магии увеличивается на 1 за каждые 2 уровня героя."
  descriptionEn: "Wistful Nostalgia - Starts with the “Masterful Rewind Life” spell. This version of the spell can revive units beyond their original amount. While casting this spell, effective Spell Power is increased by 1 for every 2 hero levels."
skills:
  - id: basic_necromancy
    name: "Основы некромантии"
    nameEn: "Basic Necromancy"
    description: "После победы в бою обращает 10% самого сильного отряда противника в дружественную нежить того же ранга, расходуя некротическую энергию. Она накапливается до 3000 и восполняется каждую неделю."
    descriptionEn: "After winning a battle, raises 10% of the strongest enemy stack as friendly Undead of the same tier. This requires Necromantic Energy, which stores up to 3000 and refills each week."
  - id: basic_thaumaturgy
    name: "Основы чародейства"
    nameEn: "Basic Thaumaturgy"
    description: "Герой может использовать книгу магии в бою ещё один раз, применяя при этом заклинание ещё неиспользованной школы магии. При каждом использовании стоимость заклинания повышается на 100%."
    descriptionEn: "The hero can use the Spellbook one more time per battle round, but only to cast a spell of a Magic School that hasn’t been used this round. Spells cost +100% mana for each use after the first."
source: https://www.olden-era.com/ru/heroes/lord_rufus
