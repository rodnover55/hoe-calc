  name: "Защита"
  nameEn: "Defence"
  description: "Сотворён иначе — Существа в его армии получают –10% урона от обычных атак, и –1% дополнительно за каждые 4 уровня героя. Кроме того, за каждые 2 уровня существа в армии получают –1% урона от дальних и дальнобойных атак."
  descriptionEn: "Built Different - Creatures in his army take –10% basic attack Damage, and –1% additionally for every 2 hero levels. Additionally, for every 4 hero levels, creatures in the army take –1% Damage from Ranged and Long Reach attacks."
skills:
