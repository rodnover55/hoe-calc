specialization:
  id: grave_robbers
  name: "Грабители могил"
  nameEn: "Grave robbers"
  description: "Гильдия костей — Прирост грабителей могил в ваших городах увеличивается на 2. Под его командованием грабители могил получают +1 к скорости, +1 к инициативе и +20% ОЗ. Их атака и защита увеличиваются на 1 за каждые 3 уровня героя, а вражеские теряют столько же."
  descriptionEn: "Bones Guild - Graverobbers growth in your cities increases by 2. Under his command, Graverobbers gain 1 Speed, 1 Initiative, and 20% HP. Their Attack and Defence increase by 1 for every 3 hero levels, and enemy Graverobbers lose an equal amount of Attack and Defence."
skills:
  - id: basic_necromancy
    name: "Основы некромантии"
    nameEn: "Basic Necromancy"
    description: "После победы в бою обращает 10% самого сильного отряда противника в дружественную нежить того же ранга, расходуя некротическую энергию. Она накапливается до 3000 и восполняется каждую неделю."
    descriptionEn: "After winning a battle, raises 10% of the strongest enemy stack as friendly Undead of the same tier. This requires Necromantic Energy, which stores up to 3000 and refills each week."
  - id: basic_luck
    name: "Основы удачи"
    nameEn: "Basic Luck"
    description: "Герой получает +1 к удаче."
    descriptionEn: "The hero gains 1 Luck."
