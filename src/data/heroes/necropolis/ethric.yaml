id: ethric
name: "Этрик"
nameEn: "Ethric"
faction: necropolis
class: "Некромант"
classEn: "Necromancer"
image: heroes/necropolis/ethric.webp
stats:
  attack: 1
  defense: 0
  spellPower: 2
  knowledge: 4
specialization:
  id: liches
  name: "Личи"
  nameEn: "Liches"
  description: "Воля, связанная могилой — Прирост личей в ваших городах увеличивается на 2. Под его командованием личи получают +1 к скорости, +1 к инициативе и +20% ОЗ. Их атака и защита увеличиваются на 1 за каждые 3 уровня героя, а вражеские теряют столько же."
  descriptionEn: "Tombbound Will - Liches growth in your cities increases by 2. Under his command, Liches gain 1 Speed, 1 Initiative, and 20% HP. Their Attack and Defence increase by 1 for every 3 hero levels, and enemy Liches lose an equal amount of Attack and Defence."
skills:
  - id: basic_necromancy
    name: "Основы некромантии"
    nameEn: "Basic Necromancy"
    description: "После победы в бою обращает 10% самого сильного отряда противника в дружественную нежить того же ранга, расходуя некротическую энергию. Она накапливается до 3000 и восполняется каждую неделю."
    descriptionEn: "After winning a battle, raises 10% of the strongest enemy stack as friendly Undead of the same tier. This requires Necromantic Energy, which stores up to 3000 and refills each week."
  - id: basic_intelligence
    name: "Основы мудрости"
    nameEn: "Basic Wisdom"
    description: "Герой может изучать заклинания до 3‑го ранга, даже не владея навыком соответствующей школы магии."
    descriptionEn: "The hero can learn up to tier‑3 spells without knowing the corresponding Magic School skill."
source: https://www.olden-era.com/ru/heroes/ethric
