id: despair_m
name: "Искусное отчаяние"
nameEn: "Masterful Despair"
school: nightshade
tier: 1
mana: 11
image: spells/nightshade/despair.webp
levels:
  - description: "Проклинает выбранный отряд противника. Проклятый отряд получает [ 10 + 10 × сила магии героя ] чистого урона в начале своего хода. Эффект суммируется. Кол‑во раундов: [ 1 + 1 за каждые 4 силы магии героя ]."
    descriptionEn: "Curses the target enemy. Cursed creatures take [ 10 + 10 × hero’s Spell Power ] Pure Damage at the start of their turn. This effect is stackable. Duration: [ 1 + 1 per every 4 hero’s Spell Power ] round(s)."
  - description: "Базовая длительность эффекта: 1 > 2."
    descriptionEn: "Base effect duration: 1 > 2."
  - description: "+50% к урону заклинания."
    descriptionEn: "+50% Damage dealt by the spell."
  - description: "Действует на все отряды противника рядом с целью."
    descriptionEn: "Affects enemy creatures adjacent to the target."
source: https://www.olden-era.com/ru/spells/despair_m
