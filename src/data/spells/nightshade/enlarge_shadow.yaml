image: spells/nightshade/enlarge_shadow.webp
levels:
  - description: "Выбранный дружественный отряд получает +3 к атаке и защите. Кол-во раундов: [ 1 + 1 за каждые 4 силы магии героя ]."
    descriptionEn: "Target friendly creature gains 3 Attack and Defense. Duration: [ 1 + 1 per every 4 hero’s Spell Power ] round(s)."
