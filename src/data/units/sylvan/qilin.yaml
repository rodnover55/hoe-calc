abilities:
  - id: embodiment
    name: "Воплощение"
    nameEn: "Embodiment"
    description: "Дух, душа или иная сила, воплотившаяся в материальном облике. Диапазон боевого духа: от –3 до 3. Диапазон удачи: от –3 до 3. Погибшие воплощения нельзя поднять некромантией после боя."
    descriptionEn: "A spirit, soul, or other intangible power that has coalesced into material form. Morale range: –3 to 3. Luck range: –3 to 3. Fallen Embodiments do NOT count towards the power of Necromancy reanimation after battle."
  - id: melee_attack
    name: "Ближний бой"
    nameEn: "Melee Attack"
    description: "Может атаковать только отряды противника на соседних гексах. Провоцирует контратаку."
    descriptionEn: "Can only attack adjacent enemies. Provokes counterattacks."
  - id: embodiment_of_air
    name: "Воплощение воздуха"
    nameEn: "Embodiment of Air"
    description: "Не оставляет труп при смерти. Неуязвим для заклинаний «Молния» и «Цепная молния»."
    descriptionEn: "This creature leaves no body upon death. Immune to “Lightning Bolt” and “Chain Lightning.”"
  - id: lightning_fast
    name: "Молниеносный"
    nameEn: "Lightning Fast"
    description: "Неуязвим для эффектов, ограничивающих передвижение."
    descriptionEn: "This creature is immune to all effects that restrict movement."
  - id: awaken_air_1
    name: "Пробуждение. Воздух I"
    nameEn: "Awaken: Air I"
    description: "Это существо получает +2 к скорости и инициативе, +20 к здоровью и «Быстрый удар». Применяется один раз за бой и действует до конца боя."
    descriptionEn: "Increases this creature’s Speed and Initiative by 2 and HP by 20 and grants it “Swift Strike.” Once per battle; lasts until the end of battle."
