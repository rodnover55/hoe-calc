id: flaming_phoenix
name: "Пылающий феникс"
nameEn: "Flaming Phoenix"
faction: sylvan
tier: 7
grade: 2
upgradeOf: phoenix
image: units/sylvan/flaming_phoenix.webp
stats:
  health: 300
  attack: 36
  defense: 27
  damageMin: 45
  damageMax: 65
  initiative: 16
  speed: 10
attackType: melee
flying: true
abilities:
  - id: embodiment
    name: "Воплощение"
    nameEn: "Embodiment"
    description: "Дух, душа или иная сила, воплотившаяся в материальном облике. Диапазон боевого духа: от –3 до 3. Диапазон удачи: от –3 до 3. Погибшие воплощения нельзя поднять некромантией после боя."
    descriptionEn: "A spirit, soul, or other intangible power that has coalesced into material form. Morale range: –3 to 3. Luck range: –3 to 3. Fallen Embodiments do NOT count towards the power of Necromancy reanimation after battle."
  - id: melee_attack
    name: "Ближний бой"
    nameEn: "Melee Attack"
    description: "Может атаковать только отряды противника на соседних гексах. Провоцирует контратаку."
    descriptionEn: "Can only attack adjacent enemies. Provokes counterattacks."
  - id: flying
    name: "Полёт"
    nameEn: "Flying"
    description: "Передвигаясь, игнорирует препятствия и ловушки."
    descriptionEn: "Movement ignores obstacles and traps."
  - id: sweeping_strike
    name: "Размах"
    nameEn: "Sweeping Strike"
    description: "Наносит урон цели и любым существам на гексах по сторонам от неё."
    descriptionEn: "Deals Damage to the target and two adjacent hexes to its sides."
  - id: embodiment_of_fire
    name: "Воплощение огня"
    nameEn: "Embodiment of Fire"
    description: "Не оставляет труп при смерти. Неуязвим для заклинаний «Шар огня», «Стена огня» и «Армагеддон»."
    descriptionEn: "This creature leaves no body upon death. Immune to “Fireball,” “Firewall,” and “Armageddon.”"
  - id: awaken_fire_2
    name: "Пробуждение. Огонь II"
    nameEn: "Awaken: Fire II"
    description: "Получает +2 к скорости и инициативе, +25 к здоровью и всегда наносит максимальный урон. Позволяет использовать остальные способности. Применяется один раз за бой и действует до конца боя."
    descriptionEn: "Increase this creature’s Speed and Initiative by 2 and HP by 25 and grants it maximum Damage. Allows the use of other abilities. Once per battle; lasts until the end of battle."
  - id: heatwave
    name: "Бессмертный"
    nameEn: "Immortal"
    description: "После смерти оставляет горсть пепла. В начале следующего раунда из неё воскресают существа: [ 1 + 50% начальной численности отряда ], но не больше начального количества. Пепел уничтожается после получения урона 3 раз(а). Один раз за бой для каждого отряда. Воскресшие существа остаются в армии после боя."
    descriptionEn: "Leaves a pile of ash upon death. At the start of the following round, [ 1 + 50% of the original units in the stack ] units are revived from that pile (no more than the original amount). Each stack can only be revived once per battle this way. The pile is destroyed upon taking Damage 3 times. Units revived this way are permanent."
growth: 27
cost: 4565
source: https://www.olden-era.com/ru/units/flaming_phoenix
