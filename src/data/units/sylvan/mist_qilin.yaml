abilities:
  - id: embodiment
    name: "Воплощение"
    description: "Дух, душа или иная сила, воплотившаяся в материальном облике. Диапазон боевого духа: от –3 до 3. Диапазон удачи: от –3 до 3. Погибшие воплощения нельзя поднять некромантией после боя."
  - id: melee_attack
    name: "Ближний бой"
    description: "Может атаковать только отряды противника на соседних гексах. Провоцирует контратаку."
  - id: embodiment_of_air
    name: "Воплощение воздуха"
    description: "Не оставляет труп при смерти. Неуязвим для заклинаний «Молния» и «Цепная молния»."
  - id: lightning_fast
    name: "Молниеносный"
    description: "Неуязвим для эффектов, ограничивающих передвижение."
  - id: awaken_air_2
    name: "Пробуждение. Воздух II"
    description: "Это существо получает +2 к скорости и инициативе, +20 к здоровью и «Быстрый удар». Позволяет использовать остальные способности. Применяется один раз за бой и действует до конца боя."
  - id: scintillating_scales
    name: "Искристая чешуя"
    description: "Соседние с этим существом противники получают +30% магического урона. Эффект не суммируется."
  - id: mist_form
    name: "Обернуться туманом"
    description: "Это существо игнорирует препятствия и получает –35% урона до конца раунда."
