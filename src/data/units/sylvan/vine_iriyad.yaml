    name: "Воплощение земли"
    description: "Не оставляет труп при смерти. Неуязвим для заклинаний «Завал» и «Каменные клыки»."
  - id: awaken_earth_1
    name: "Пробуждение. Земля I"
    description: "Это существо получает +2 к скорости и инициативе, +10 к здоровью и неограниченные контратаки. Применяется один раз за бой и действует до конца боя."
