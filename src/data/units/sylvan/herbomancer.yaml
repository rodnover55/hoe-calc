abilities:
  - id: living
    name: "Живое существо"
    description: "Разумный обитатель Джадама. Диапазон боевого духа: от –5 до 5. Диапазон удачи: от –3 до 3. Погибших живых существ можно поднять некромантией после боя."
  - id: long_reach
    name: "Атака на расстоянии"
    description: "Атакует отряд противника через один гекс. Не провоцирует контратаку и не занимает гекс рядом с целью."
  - id: mushroom_magic_1
    name: "Грибная магия"
    description: "Заклинания его героя стоят –1 маны. Эффект не суммируется: действует только самый сильный из активных."
  - id: shroomsong_i
    name: "Грибная песнь"
    description: "Расходует все заряды концентрации и восстанавливает ману героя: 4 за каждый потраченный заряд. Один раз за бой."
  - id: swarm_of_bees
    name: "Пчелиный улей"
    description: "Наносит [ 16 + 4 × численность отряда ] урона выбранному отряду противника. Пчёлы продолжают атаковать цель, и она получает [ 16 + 4 × численность отряда ] урона в начале каждого своего хода. Эффект суммируется. Кол‑во раундов: 3."
