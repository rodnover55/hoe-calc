id: murmurmancer
name: "Шептомант"
nameEn: "Murmurmancer"
faction: sylvan
tier: 5
grade: 1
upgradeOf: herbomancer
image: units/sylvan/murmurmancer.webp
stats:
  health: 60
  attack: 12
  defense: 14
  damageMin: 18
  damageMax: 18
  initiative: 8
  speed: 5
attackType: long_reach
flying: false
abilities:
  - id: living
    name: "Живое существо"
    nameEn: "Living"
    description: "Разумный обитатель Джадама. Диапазон боевого духа: от –5 до 5. Диапазон удачи: от –3 до 3. Погибших живых существ можно поднять некромантией после боя."
    descriptionEn: "A fully sentient inhabitant of Jadame. Morale range: –5 to 5. Luck range: –3 to 3. Fallen Living creatures count towards the power of Necromancy reanimation after battle."
  - id: long_reach
    name: "Атака на расстоянии"
    nameEn: "Long Reach"
    description: "Атакует отряд противника через один гекс. Не провоцирует контратаку и не занимает гекс рядом с целью."
    descriptionEn: "Has an attack that targets the hex directly behind an adjacent hex. It doesn’t provoke counterattacks and doesn’t move the attacker next to their target."
  - id: mushroom_magic_2
    name: "Грибная магия"
    nameEn: "Mushroom Magic"
    description: "Заклинания его героя стоят –2 маны. Эффект не суммируется: действует только самый сильный из активных."
    descriptionEn: "Reduces the mana cost of the hero’s spells by 2. This effect does not stack; only the strongest one is active."
  - id: shroomsong_i
    name: "Грибная песнь"
    nameEn: "Shroomsong"
    description: "Расходует все заряды концентрации и восстанавливает ману героя: 4 за каждый потраченный заряд. Один раз за бой."
    descriptionEn: "Once per battle, spends all Focus Charges to restore the hero’s mana: 4 for each Focus Charge spent."
  - id: echoes_of_murmurwoods
    name: "Эхо из рощи"
    nameEn: "Echoes of the Murmurwoods"
    description: "Позволяет своему герою использовать книгу магии ещё раз в этом раунде. Снимает любые эффекты, запрещающие её использование."
    descriptionEn: "Allows the hero to use the Spellbook again this round. Removes any effects that prevent its use."
growth: 14
cost: 1818
source: https://www.olden-era.com/ru/units/murmurmancer
