abilities:
  - id: construct
    name: "Конструкт"
    description: "Объект, одушевлённый при помощи магии или приведённый в движение иным способом. Боевой дух всегда нейтральный. Удача всегда нейтральная. Погибшие конструкты нельзя поднять некромантией после боя."
  - id: ranged_attack
    name: "Выстрел"
    description: "Атакует отряд противника на любом расстоянии. Если на соседнем гексе находится отряд противника, вместо выстрела атакует в ближнем бою, нанося –50% урона. Если до цели более 3 гексов, наносит –10% урона за каждый лишний гекс (максимальный штраф: –50%)."
  - id: duelist
    name: "Дуэлянт"
    description: "Не имеет штрафа в ближнем бою и наносит полный урон."
  - id: sharpshooter
    name: "Снайпер"
    description: "Независимо от расстояния наносит полный урон выстрелами."
  - id: magic_defence_4
    name: "Защита от магии IV"
    description: "Получает –90% магического урона."
  - id: trap_time_loop
    name: "Временная петля"
    description: "Размещает на выбранном гексе невидимую ловушку. Попавший в неё пеший отряд противника переносится на гекс, с которого начал движение, и заканчивает ход. Кол‑во раундов: 2."
