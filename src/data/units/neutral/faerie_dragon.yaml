abilities:
  - id: dragon
    name: "Дракон"
    nameEn: "巨龙"
    description: "Могучее древнее существо, нередко разумное и обладающее поразительными магическими свойствами. Диапазон боевого духа: от 0 до 5. Диапазон удачи: от 0 до 3. Погибших драконов можно поднять некромантией после боя."
    descriptionEn: "强大且古老的生物，通常具有智能，体内蕴含神奇魔法。 士气范围：0 至 5 幸运范围：0 至 3 阵亡巨龙生物会计入战斗结束后的死灵术复苏强度。"
  - id: melee_attack
    name: "Ближний бой"
    nameEn: "Melee Attack"
    description: "Может атаковать только отряды противника на соседних гексах. Провоцирует контратаку."
    descriptionEn: "Can only attack adjacent enemies. Provokes counterattacks."
  - id: blink
    name: "Скачок"
    nameEn: "Blink"
    description: "Вместо обычного передвижения телепортируется, игнорируя препятствия и ловушки."
    descriptionEn: "Teleports directly to destination hex, ignoring obstacles and traps."
  - id: magic_immunity_5
    name: "Невосприимчивость к магии V"
    nameEn: "Magic Immunity V"
    description: "Неуязвимо для заклинаний 5‑го ранга и ниже."
    descriptionEn: "Immune to tier‑5 and lower spells."
  - id: mana_drinker
    name: "Манохлёб"
    nameEn: "Mana Drinker"
    description: "В начале каждого своего хода крадёт 2 маны у героя противника (если он есть)."
    descriptionEn: "Steals 2 mana from the enemy hero (if present) at the start of its turn."
  - id: bubble_of_silence
    name: "Пузырёк молчания"
    nameEn: "Bubble of Silence"
    description: "Отряды противника на соседних с ним гексах не могут применять способности."
    descriptionEn: "Adjacent enemy creatures cannot use abilities."
  - id: nullify
    name: "Свести на нет"
    nameEn: "Nullify"
    description: ""
    descriptionEn: "Dispels all negative and positive effects from the target."
  - id: banish_summons
    name: "Свести на нет"
    nameEn: "Banish Summons"
    description: "Снимает все положительные и отрицательные эффекты цели."
    descriptionEn: "Dispels all summoned creatures and temporary stacks."
growth: 15
cost: 1515
