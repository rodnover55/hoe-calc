id: phantasm
name: "Фантазм"
nameEn: "Phantasm"
faction: necropolis
tier: 2
grade: 2
upgradeOf: wight
image: units/necropolis/phantasm.webp
stats:
  health: 8
  attack: 6
  defense: 4
  damageMin: 2
  damageMax: 4
  initiative: 6
  speed: 7
attackType: melee
flying: true
abilities:
  - id: undead
    name: "Нежить"
    nameEn: "Undead"
    description: "Существо или личность, жизнь которой была продлена нечестивыми методами. Боевой дух всегда нейтральный. Диапазон удачи: от –5 до 5. Погибшую нежить нельзя поднять некромантией после боя."
    descriptionEn: "A creature or person whose life has been prolonged by unnatural means. Morale: Always neutral. Luck range: –5 to 5. Fallen Undead do NOT count towards the power of Necromancy reanimation after battle."
  - id: melee_attack
    name: "Ближний бой"
    nameEn: "Melee Attack"
    description: "Может атаковать только отряды противника на соседних гексах. Провоцирует контратаку."
    descriptionEn: "Can only attack adjacent enemies. Provokes counterattacks."
  - id: flying
    name: "Полёт"
    nameEn: "Flying"
    description: "Передвигаясь, игнорирует препятствия и ловушки."
    descriptionEn: "Movement ignores obstacles and traps."
  - id: memory_devourer_ii
    name: "Пожиратель памяти"
    nameEn: "Memory Devourer"
    description: "Каждая атака преобразует 40% наносимого урона в дополнительное здоровье. Это может создать временных существ в этом отряде."
    descriptionEn: "Each attack converts 40% of the Damage dealt into additional HP. This can create temporary units in this creature’s stack."
  - id: nightmares
    name: "Кошмары"
    nameEn: "Nightmares"
    description: "Атаки этого существа проклинают цель. Проклятый отряд получает [ 8 + 1 × численность отряда ] чистого урона в начале своего хода. Эффект суммируется. Кол‑во раундов: 2."
    descriptionEn: "Attacks curse the target. Cursed creatures take [ 8 + 1 × amount of units ] Pure Damage at the start of their turn. This effect is stackable. Duration: 2 round(s)."
growth: 4
cost: 24
source: https://www.olden-era.com/ru/units/phantasm
