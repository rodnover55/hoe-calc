  - id: nightmares
    name: "Кошмары"
    description: "Атаки этого существа проклинают цель. Проклятый отряд получает [ 8 + 1 × численность отряда ] чистого урона в начале своего хода. Эффект суммируется. Кол‑во раундов: 2."
