id: armoured_hound
name: "Бронированная гончая"
nameEn: "Armoured Hound"
faction: necropolis
tier: 3
grade: 2
upgradeOf: undead_pet
image: units/necropolis/armoured_hound.webp
stats:
  health: 18
  attack: 4
  defense: 8
  damageMin: 3
  damageMax: 5
  initiative: 5
  speed: 5
attackType: melee
flying: false
abilities:
  - id: undead
    name: "Нежить"
    nameEn: "Undead"
    description: "Существо или личность, жизнь которой была продлена нечестивыми методами. Боевой дух всегда нейтральный. Диапазон удачи: от –5 до 5. Погибшую нежить нельзя поднять некромантией после боя."
    descriptionEn: "A creature or person whose life has been prolonged by unnatural means. Morale: Always neutral. Luck range: –5 to 5. Fallen Undead do NOT count towards the power of Necromancy reanimation after battle."
  - id: melee_attack
    name: "Ближний бой"
    nameEn: "Melee Attack"
    description: "Может атаковать только отряды противника на соседних гексах. Провоцирует контратаку."
    descriptionEn: "Can only attack adjacent enemies. Provokes counterattacks."
  - id: protect_the_fallen
    name: "Защищает павших"
    nameEn: "Protect the Fallen"
    description: "Каждый раз, когда погибает дружественный отряд, это существо получает +3 к защите до конца боя."
    descriptionEn: "Whenever a friendly creature dies, this creature gains +3 Defense until the end of battle."
  - id: lacerated_wounds
    name: "Рваные раны"
    nameEn: "Lacerated Wounds"
    description: "Атаки этого существа ранят цель. Раненый отряд получает [ 12 + 2 × численность отряда ] урона в начале своего хода. Эффект суммируется. Кол‑во раундов: 2."
    descriptionEn: "Attacks wound the target. Wounded creatures take [ 12 + 2 × amount of units ] Damage at the start of their turn. This effect is stackable. Duration: 2 round(s)."
growth: 8
cost: 35
source: https://www.olden-era.com/ru/units/armoured_hound
