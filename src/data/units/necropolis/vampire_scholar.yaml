abilities:
  - id: undead
    name: "Нежить"
    description: "Существо или личность, жизнь которой была продлена нечестивыми методами. Боевой дух всегда нейтральный. Диапазон удачи: от –5 до 5. Погибшую нежить нельзя поднять некромантией после боя."
  - id: long_reach
    name: "Атака на расстоянии"
    description: "Атакует отряд противника через один гекс. Не провоцирует контратаку и не занимает гекс рядом с целью."
  - id: flying
    name: "Полёт"
    description: "Передвигаясь, игнорирует препятствия и ловушки."
  - id: vampirism
    name: "Вампиризм"
    description: "Каждая атака восстанавливает здоровье этого существа: 40% от наносимого урона. Воскрешает павших существ."
  - id: blood_transfusion
    name: "Переливание крови"
    description: "Связывает отряд противника с выбранным дружественным отрядом. Противник получает [ 30 × численность отряда ] магического урона, а дружественный отряд восстанавливает здоровье: [ 30 × численность отряда ]% от нанесённого урона. Воскрешает павших существ."
