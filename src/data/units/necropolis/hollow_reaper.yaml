id: hollow_reaper
name: "Полый жнец"
nameEn: "Hollow Reaper"
faction: necropolis
tier: 6
grade: 2
upgradeOf: dread_knight
image: units/necropolis/hollow_reaper.webp
stats:
  health: 80
  attack: 25
  defense: 18
  damageMin: 24
  damageMax: 26
  initiative: 11
  speed: 7
attackType: melee
flying: false
abilities:
  - id: undead
    name: "Нежить"
    nameEn: "Undead"
    description: "Существо или личность, жизнь которой была продлена нечестивыми методами. Боевой дух всегда нейтральный. Диапазон удачи: от –5 до 5. Погибшую нежить нельзя поднять некромантией после боя."
    descriptionEn: "A creature or person whose life has been prolonged by unnatural means. Morale: Always neutral. Luck range: –5 to 5. Fallen Undead do NOT count towards the power of Necromancy reanimation after battle."
  - id: melee_attack
    name: "Ближний бой"
    nameEn: "Melee Attack"
    description: "Может атаковать только отряды противника на соседних гексах. Провоцирует контратаку."
    descriptionEn: "Can only attack adjacent enemies. Provokes counterattacks."
  - id: death_stare
    name: "Смертельный взгляд"
    nameEn: "Death Stare"
    description: "При каждой атаке дополнительно убивает часть существ в отряде противника: 1. Действует на существ не выше 7‑го ранга."
    descriptionEn: "Each attack also kills +1 enemy unit(s) in addition to regular Damage. Works on creatures up to tier 7."
  - id: dreadful_presence_2
    name: "Ужасающее присутствие"
    nameEn: "Dreadful Presence"
    description: "Снижает боевой дух всех существ противника на 2. Эффект не суммируется: действует только самый сильный из активных."
    descriptionEn: "Reduces all enemies’ Morale by 2. This effect does not stack; only the strongest one is active."
  - id: hungering_hollow
    name: "Алчущая пустота"
    nameEn: "Hungering Hollow"
    description: "Каждый раз, когда погибает дружественный отряд, это существо получает +3 к атаке до конца боя."
    descriptionEn: "Whenever a friendly creature dies, this creature gains +3 Attack until the end of battle."
  - id: reap_without_sowing
    name: "Пожинать, не сея"
    nameEn: "Reap Without Sowing"
    description: "Атакует цель и все отряды противника на соседних с ней гексах."
    descriptionEn: "Hits the target and all enemies adjacent to it."
growth: 18
cost: 2426
source: https://www.olden-era.com/ru/units/hollow_reaper
