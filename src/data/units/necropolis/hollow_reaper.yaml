abilities:
  - id: undead
    name: "Нежить"
    description: "Существо или личность, жизнь которой была продлена нечестивыми методами. Боевой дух всегда нейтральный. Диапазон удачи: от –5 до 5. Погибшую нежить нельзя поднять некромантией после боя."
  - id: melee_attack
    name: "Ближний бой"
    description: "Может атаковать только отряды противника на соседних гексах. Провоцирует контратаку."
  - id: death_stare
    name: "Смертельный взгляд"
    description: "При каждой атаке дополнительно убивает часть существ в отряде противника: 1. Действует на существ не выше 7‑го ранга."
  - id: dreadful_presence_2
    name: "Ужасающее присутствие"
    description: "Снижает боевой дух всех существ противника на 2. Эффект не суммируется: действует только самый сильный из активных."
  - id: hungering_hollow
    name: "Алчущая пустота"
    description: "Каждый раз, когда погибает дружественный отряд, это существо получает +3 к атаке до конца боя."
  - id: reap_without_sowing
    name: "Пожинать, не сея"
    description: "Атакует цель и все отряды противника на соседних с ней гексах."
