id: barghest
name: "Баргест"
nameEn: "Barghest"
faction: necropolis
tier: 3
grade: 1
upgradeOf: undead_pet
image: units/necropolis/barghest.webp
stats:
  health: 14
  attack: 4
  defense: 6
  damageMin: 3
  damageMax: 5
  initiative: 8
  speed: 6
attackType: melee
flying: false
abilities:
  - id: undead
    name: "Нежить"
    nameEn: "Undead"
    description: "Существо или личность, жизнь которой была продлена нечестивыми методами. Боевой дух всегда нейтральный. Диапазон удачи: от –5 до 5. Погибшую нежить нельзя поднять некромантией после боя."
    descriptionEn: "A creature or person whose life has been prolonged by unnatural means. Morale: Always neutral. Luck range: –5 to 5. Fallen Undead do NOT count towards the power of Necromancy reanimation after battle."
  - id: melee_attack
    name: "Ближний бой"
    nameEn: "Melee Attack"
    description: "Может атаковать только отряды противника на соседних гексах. Провоцирует контратаку."
    descriptionEn: "Can only attack adjacent enemies. Provokes counterattacks."
  - id: bone_crusher
    name: "Костолом"
    nameEn: "Bone Crusher"
    description: "При каждой атаке снижает защиту цели на –1 и повышает свою защиту на то же значение до конца боя. Эффект нельзя снять."
    descriptionEn: "Reduces target’s Defense by 1 with each strike and gains an equal amount until the end of battle. This effect cannot be dispelled."
  - id: call_the_pack
    name: "Позвать стаю"
    nameEn: "Call the Pack"
    description: "Это существо получает временных существ в свой отряд: [ 25% × численность отряда ]."
    descriptionEn: "This creature adds [ 25% × amount of units ] temporary unit(s) to its stack."
growth: 6
cost: 35
source: https://www.olden-era.com/ru/units/barghest
