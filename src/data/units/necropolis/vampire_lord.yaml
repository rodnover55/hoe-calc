abilities:
  - id: undead
    name: "Нежить"
    nameEn: "Undead"
    description: "Существо или личность, жизнь которой была продлена нечестивыми методами. Боевой дух всегда нейтральный. Диапазон удачи: от –5 до 5. Погибшую нежить нельзя поднять некромантией после боя."
    descriptionEn: "A creature or person whose life has been prolonged by unnatural means. Morale: Always neutral. Luck range: –5 to 5. Fallen Undead do NOT count towards the power of Necromancy reanimation after battle."
  - id: melee_attack
    name: "Ближний бой"
    nameEn: "Melee Attack"
    description: "Может атаковать только отряды противника на соседних гексах. Провоцирует контратаку."
    descriptionEn: "Can only attack adjacent enemies. Provokes counterattacks."
  - id: flying
    name: "Полёт"
    nameEn: "Flying"
    description: "Передвигаясь, игнорирует препятствия и ловушки."
    descriptionEn: "Movement ignores obstacles and traps."
  - id: vampirism
    name: "Вампиризм"
    nameEn: "Vampirism"
    description: "Каждая атака восстанавливает здоровье этого существа: 40% от наносимого урона. Воскрешает павших существ."
    descriptionEn: "Each attack restores 40% of Damage dealt as HP to this creature. This can revive fallen units."
  - id: swift_strike
    name: "Быстрый удар"
    nameEn: "Swift Strike"
    description: "Атака не провоцирует контратаки."
    descriptionEn: "Enemies do not counterattack."
growth: 26
cost: 3030
