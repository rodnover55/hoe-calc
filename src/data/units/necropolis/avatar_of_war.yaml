id: avatar_of_war
name: "Аватара войны"
nameEn: "Avatar of War"
faction: necropolis
tier: 6
grade: 1
upgradeOf: dread_knight
image: units/necropolis/avatar_of_war.webp
stats:
  health: 80
  attack: 19
  defense: 20
  damageMin: 18
  damageMax: 20
  initiative: 10
  speed: 8
attackType: melee
flying: false
abilities:
  - id: undead
    name: "Нежить"
    nameEn: "Undead"
    description: "Существо или личность, жизнь которой была продлена нечестивыми методами. Боевой дух всегда нейтральный. Диапазон удачи: от –5 до 5. Погибшую нежить нельзя поднять некромантией после боя."
    descriptionEn: "A creature or person whose life has been prolonged by unnatural means. Morale: Always neutral. Luck range: –5 to 5. Fallen Undead do NOT count towards the power of Necromancy reanimation after battle."
  - id: melee_attack
    name: "Ближний бой"
    nameEn: "Melee Attack"
    description: "Может атаковать только отряды противника на соседних гексах. Провоцирует контратаку."
    descriptionEn: "Can only attack adjacent enemies. Provokes counterattacks."
  - id: double_strike
    name: "Двойной удар"
    nameEn: "Double Strike"
    description: "Атакует дважды."
    descriptionEn: "Strikes twice when performing attacks."
  - id: dreadful_presence_2
    name: "Ужасающее присутствие"
    nameEn: "Dreadful Presence"
    description: "Снижает боевой дух всех существ противника на 2. Эффект не суммируется: действует только самый сильный из активных."
    descriptionEn: "Reduces all enemies’ Morale by 2. This effect does not stack; only the strongest one is active."
  - id: war_incarnate
    name: "Война во плоти"
    nameEn: "War Incarnate"
    description: "При каждой атаке снижает атаку цели на 1 и повышает свою атаку на то же значение до конца боя. Эффект нельзя снять."
    descriptionEn: "For each attack, this creature reduces the target’s Attack by 1 and gains an equal amount until the end of battle. This effect cannot be dispelled."
growth: 20
cost: 1820
source: https://www.olden-era.com/ru/units/avatar_of_war
