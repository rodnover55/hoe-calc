    name: "Пожиратель памяти"
    nameEn: "Memory Devourer"
    description: "Каждая атака преобразует 20% наносимого урона в дополнительное здоровье. Это может создать временных существ в этом отряде."
    descriptionEn: "Each attack converts 20% of the Damage dealt into additional HP. This can create temporary units in this creature’s stack."
