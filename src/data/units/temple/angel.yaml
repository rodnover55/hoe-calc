flying: true
abilities:
  - id: flying
    name: "Полёт"
    description: "Передвигаясь, игнорирует препятствия и ловушки."
  - id: forging_perfection
    name: "Ковка совершенства"
    description: "Каждый раз, когда на дружественный отряд накладывают положительный эффект, он также применяется к этому существу с той же длительностью и мощью. Если положительный эффект одновременно накладывается на несколько отрядов, то это существо получает его только один раз."
  - id: refract_and_reflect
    name: "Преломление и отражение"
    description: "Накладывает копию всех своих положительных эффектов на выбранный дружественный отряд. Не активирует «Ковку совершенства»."
  - id: ranged_attack
    name: "Выстрел"
    description: "Атакует отряд противника на любом расстоянии. Если на соседнем гексе находится отряд противника, вместо выстрела атакует в ближнем бою, нанося –50% урона. Если до цели более 3 гексов, наносит –10% урона за каждый лишний гекс (максимальный штраф: –50%)."
  - id: embodiment
    name: "Воплощение"
    description: "Дух, душа или иная сила, воплотившаяся в материальном облике. Диапазон боевого духа: от –3 до 3. Диапазон удачи: от –3 до 3. Погибшие воплощения нельзя поднять некромантией после боя."
growth: 30
cost: 5075
source: https://www.olden-era.com/ru/units/angel
