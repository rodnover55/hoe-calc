id: angel
name: "Ангел"
nameEn: "Angel"
faction: temple
tier: 7
grade: 0
image: units/temple/angel.webp
stats:
  health: 225
  attack: 30
  defense: 30
  damageMin: 50
  damageMax: 75
  initiative: 8
  speed: 4
attackType: ranged
flying: true
abilities:
  - id: flying
    name: "Полёт"
    nameEn: "Flying"
    description: "Передвигаясь, игнорирует препятствия и ловушки."
    descriptionEn: "Movement ignores obstacles and traps."
  - id: forging_perfection
    name: "Ковка совершенства"
    nameEn: "Forging Perfection"
    description: "Каждый раз, когда на дружественный отряд накладывают положительный эффект, он также применяется к этому существу с той же длительностью и мощью. Если положительный эффект одновременно накладывается на несколько отрядов, то это существо получает его только один раз."
    descriptionEn: "Whenever a positive effect is applied to a friendly creature, it is also applied to this creature. The effect’s duration and power are copied. If the effect targets multiple stacks, it is applied to this creature only once."
  - id: refract_and_reflect
    name: "Преломление и отражение"
    nameEn: "Refract and Reflect"
    description: "Накладывает копию всех своих положительных эффектов на выбранный дружественный отряд. Не активирует «Ковку совершенства»."
    descriptionEn: "Applies a copy of all positive effects currently on this creature to a friendly creature. Does not trigger “Forging Perfection.”"
  - id: ranged_attack
    name: "Выстрел"
    nameEn: "Ranged Attack"
    description: "Атакует отряд противника на любом расстоянии. Если на соседнем гексе находится отряд противника, вместо выстрела атакует в ближнем бою, нанося –50% урона. Если до цели более 3 гексов, наносит –10% урона за каждый лишний гекс (максимальный штраф: –50%)."
    descriptionEn: "Can attack enemies at any range. Replaced with a weaker Melee attack if an enemy is adjacent. –50% Melee Damage. Targets 3 or more hexes away take –10% Damage per hex (up to –50%)."
  - id: embodiment
    name: "Воплощение"
    nameEn: "Embodiment"
    description: "Дух, душа или иная сила, воплотившаяся в материальном облике. Диапазон боевого духа: от –3 до 3. Диапазон удачи: от –3 до 3. Погибшие воплощения нельзя поднять некромантией после боя."
    descriptionEn: "A spirit, soul, or other intangible power that has coalesced into material form. Morale range: –3 to 3. Luck range: –3 to 3. Fallen Embodiments do NOT count towards the power of Necromancy reanimation after battle."
growth: 30
cost: 5075
source: https://www.olden-era.com/ru/units/angel
