id: hierophant
name: "Иерофант"
nameEn: "Hierophant"
faction: temple
tier: 4
grade: 1
upgradeOf: light_weaver
image: units/temple/hierophant.webp
stats:
  health: 35
  attack: 13
  defense: 16
  damageMin: 11
  damageMax: 11
  initiative: 6
  speed: 4
attackType: ranged
flying: false
abilities:
  - id: inner_light_ii
    name: "Внутреннее сияние"
    nameEn: "Inner Glow"
    description: "Усиливает выбранный дружественный отряд. Он получает +5 к атаке и защите, а также +2 к скорости и инициативе. Кол‑во раундов: 2."
    descriptionEn: "Increases target friendly creature’s Attack and Defense by 5, Speed and Initiative by 2. Duration: 2 round(s)."
  - id: holy_ablution
    name: "Омовение"
    nameEn: "Holy Ablution"
    description: "Снимает все отрицательные эффекты со всех дружественных существ и полностью восстанавливает их здоровье."
    descriptionEn: "Dispels all negative effects from all friendly creatures and fully restores their HP."
  - id: ranged_attack
    name: "Выстрел"
    nameEn: "Ranged Attack"
    description: "Атакует отряд противника на любом расстоянии. Если на соседнем гексе находится отряд противника, вместо выстрела атакует в ближнем бою, нанося –50% урона. Если до цели более 3 гексов, наносит –10% урона за каждый лишний гекс (максимальный штраф: –50%)."
    descriptionEn: "Can attack enemies at any range. Replaced with a weaker Melee attack if an enemy is adjacent. –50% Melee Damage. Targets 3 or more hexes away take –10% Damage per hex (up to –50%)."
  - id: living
    name: "Живое существо"
    nameEn: "Living"
    description: "Разумный обитатель Джадама. Диапазон боевого духа: от –5 до 5. Диапазон удачи: от –3 до 3. Погибших живых существ можно поднять некромантией после боя."
    descriptionEn: "A fully sentient inhabitant of Jadame. Morale range: –5 to 5. Luck range: –3 to 3. Fallen Living creatures count towards the power of Necromancy reanimation after battle."
growth: 16
cost: 1111
source: https://www.olden-era.com/ru/units/hierophant
