id: sun_herald
name: "Вестник Солнца"
nameEn: "Sun Herald"
faction: temple
tier: 4
grade: 2
upgradeOf: light_weaver
image: units/temple/sun_herald.webp
stats:
  health: 35
  attack: 16
  defense: 13
  damageMin: 11
  damageMax: 18
  initiative: 5
  speed: 3
attackType: ranged
flying: false
abilities:
  - id: anointed_for_damage
    name: "Помазана на урон"
    nameEn: "Anointed for Damage"
    description: "Получает +1 к наносимому урону до конца боя каждый раз, когда на неё накладывают положительный эффект."
    descriptionEn: "Whenever this creature gains a positive effect, it gains +1 Damage until the end of the battle."
  - id: exaltation
    name: "Возвышение"
    nameEn: "Exaltation"
    description: "Выбранный дружественный отряд наносит максимальный урон. Кол‑во раундов: 2."
    descriptionEn: "Target friendly creature deals maximum Damage. Duration: 2 round(s)."
  - id: ranged_attack
    name: "Выстрел"
    nameEn: "Ranged Attack"
    description: "Атакует отряд противника на любом расстоянии. Если на соседнем гексе находится отряд противника, вместо выстрела атакует в ближнем бою, нанося –50% урона. Если до цели более 3 гексов, наносит –10% урона за каждый лишний гекс (максимальный штраф: –50%)."
    descriptionEn: "Can attack enemies at any range. Replaced with a weaker Melee attack if an enemy is adjacent. –50% Melee Damage. Targets 3 or more hexes away take –10% Damage per hex (up to –50%)."
  - id: living
    name: "Живое существо"
    nameEn: "Living"
    description: "Разумный обитатель Джадама. Диапазон боевого духа: от –5 до 5. Диапазон удачи: от –3 до 3. Погибших живых существ можно поднять некромантией после боя."
    descriptionEn: "A fully sentient inhabitant of Jadame. Morale range: –5 to 5. Luck range: –3 to 3. Fallen Living creatures count towards the power of Necromancy reanimation after battle."
growth: 13
cost: 1118
source: https://www.olden-era.com/ru/units/sun_herald
