    descriptionEn: "Ignores 30% of the enemy’s Defense."
  - id: inspiring_i
    name: "Воодушевление"
    nameEn: "Inspiring"
    description: "Повышает боевой дух дружественных существ на 1. Эффект не суммируется: действует только самый сильный из активных."
