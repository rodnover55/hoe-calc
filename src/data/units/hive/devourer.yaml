id: devourer
name: "ПОЖИРАТЕЛЬ"
nameEn: "DEVOURER"
faction: hive
tier: 6
grade: 2
upgradeOf: waurms
image: units/hive/devourer.webp
stats:
  health: 120
  attack: 21
  defense: 21
  damageMin: 26
  damageMax: 28
  initiative: 8
  speed: 10
attackType: melee
flying: false
abilities:
  - id: hive_spawn
    name: "Порождение Роя"
    nameEn: "Hive Spawn"
    description: "Часть Роя, объединённого общим разумом и служащего могучему повелителю из‑за пределов постижимого. Диапазон боевого духа: от –5 до 5. Диапазон удачи: от –5 до 5. Погибшие порождения Роя можно поднять некромантией после боя."
    descriptionEn: "A part of a hivemind that serves a powerful lord from beyond. Morale range: –5 to 5. Luck range: –5 to 5. Fallen Hive Spawn count towards the power of Necromancy reanimation after battle."
  - id: melee_attack
    name: "Ближний бой"
    nameEn: "Melee Attack"
    description: "Может атаковать только отряды противника на соседних гексах. Провоцирует контратаку."
    descriptionEn: "Can only attack adjacent enemies. Provokes counterattacks."
  - id: blink
    name: "Скачок"
    nameEn: "Blink"
    description: "Вместо обычного передвижения телепортируется, игнорируя препятствия и ловушки."
    descriptionEn: "Teleports directly to destination hex, ignoring obstacles and traps."
  - id: corpse_eater
    name: "Пожиратель трупов"
    nameEn: "Corpse Eater"
    description: "При перемещении на гекс с трупом пожирает его, восстанавливая 65 здоровья. Воскрешает павших существ."
    descriptionEn: "If destination hex contains a fallen corpse, it is devoured, restoring 65 HP. This can revive fallen units."
  - id: demonic_stench_ii
    name: "Демоническое зловоние"
    nameEn: "Demonic Stench"
    description: "Отряды противника получают –2 к удаче. Эффект не суммируется: действует только самый сильный из активных."
    descriptionEn: "Reduces enemy creatures’ Luck by 2. This effect does not stack; only the strongest one is active."
  - id: hivemind_nest_protector
    name: "Рой. Защитник гнезда"
    nameEn: "Hivemind: Nest Protector"
    description: "В начале боя получает +1 к защите за каждое другое уникальное существо Роя в армии. При смерти генерирует очки концентрации: 2."
    descriptionEn: "At the start of battle, for each other unique Hive creature in the army, this creature’s Defense increases by 1. Upon death, this creature generates 2 Focus Point(s)."
  - id: devour
    name: "Не жуя"
    nameEn: "Devour"
    description: "Если численность выбранного отряда противника менее 40% от начальной, он мгновенно уничтожается. Убитые таким образом существа не оставляют труп."
    descriptionEn: "If target enemy creature has fewer than 40% of its original units, it is destroyed immediately. Creatures killed this way leave no corpse."
growth: 21
cost: 2628
source: https://www.olden-era.com/ru/units/devourer
