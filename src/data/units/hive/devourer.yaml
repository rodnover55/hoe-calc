abilities:
  - id: hive_spawn
    name: "Порождение Роя"
    description: "Часть Роя, объединённого общим разумом и служащего могучему повелителю из‑за пределов постижимого. Диапазон боевого духа: от –5 до 5. Диапазон удачи: от –5 до 5. Погибшие порождения Роя можно поднять некромантией после боя."
  - id: melee_attack
    name: "Ближний бой"
    description: "Может атаковать только отряды противника на соседних гексах. Провоцирует контратаку."
  - id: blink
    name: "Скачок"
    description: "Вместо обычного передвижения телепортируется, игнорируя препятствия и ловушки."
  - id: corpse_eater
    name: "Пожиратель трупов"
    description: "При перемещении на гекс с трупом пожирает его, восстанавливая 65 здоровья. Воскрешает павших существ."
  - id: demonic_stench_ii
    name: "Демоническое зловоние"
    description: "Отряды противника получают –2 к удаче. Эффект не суммируется: действует только самый сильный из активных."
  - id: hivemind_nest_protector
    name: "Рой. Защитник гнезда"
    description: "В начале боя получает +1 к защите за каждое другое уникальное существо Роя в армии. При смерти генерирует очки концентрации: 2."
  - id: devour
    name: "Не жуя"
    description: "Если численность выбранного отряда противника менее 40% от начальной, он мгновенно уничтожается. Убитые таким образом существа не оставляют труп."
