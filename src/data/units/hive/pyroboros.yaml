id: pyroboros
name: "Пироборос"
nameEn: "Pyroboros"
faction: hive
tier: 6
grade: 1
upgradeOf: waurms
image: units/hive/pyroboros.webp
stats:
  health: 120
  attack: 21
  defense: 21
  damageMin: 21
  damageMax: 23
  initiative: 9
  speed: 8
attackType: ranged
flying: false
abilities:
  - id: hive_spawn
    name: "Порождение Роя"
    nameEn: "Hive Spawn"
    description: "Часть Роя, объединённого общим разумом и служащего могучему повелителю из‑за пределов постижимого. Диапазон боевого духа: от –5 до 5. Диапазон удачи: от –5 до 5. Погибшие порождения Роя можно поднять некромантией после боя."
    descriptionEn: "A part of a hivemind that serves a powerful lord from beyond. Morale range: –5 to 5. Luck range: –5 to 5. Fallen Hive Spawn count towards the power of Necromancy reanimation after battle."
  - id: ranged_attack
    name: "Выстрел"
    nameEn: "Ranged Attack"
    description: "Атакует отряд противника на любом расстоянии. Если на соседнем гексе находится отряд противника, вместо выстрела атакует в ближнем бою, нанося –50% урона. Если до цели более 3 гексов, наносит –10% урона за каждый лишний гекс (максимальный штраф: –50%)."
    descriptionEn: "Can attack enemies at any range. Replaced with a weaker Melee attack if an enemy is adjacent. –50% Melee Damage. Targets 3 or more hexes away take –10% Damage per hex (up to –50%)."
  - id: blink
    name: "Скачок"
    nameEn: "Blink"
    description: "Вместо обычного передвижения телепортируется, игнорируя препятствия и ловушки."
    descriptionEn: "Teleports directly to destination hex, ignoring obstacles and traps."
  - id: corpse_eater
    name: "Пожиратель трупов"
    nameEn: "Corpse Eater"
    description: "При перемещении на гекс с трупом пожирает его, восстанавливая 65 здоровья. Воскрешает павших существ."
    descriptionEn: "If destination hex contains a fallen corpse, it is devoured, restoring 65 HP. This can revive fallen units."
  - id: demonic_stench_ii
    name: "Демоническое зловоние"
    nameEn: "Demonic Stench"
    description: "Отряды противника получают –2 к удаче. Эффект не суммируется: действует только самый сильный из активных."
    descriptionEn: "Reduces enemy creatures’ Luck by 2. This effect does not stack; only the strongest one is active."
  - id: duelist
    name: "Дуэлянт"
    nameEn: "Duelist"
    description: "Не имеет штрафа в ближнем бою и наносит полный урон."
    descriptionEn: "Receives no penalty in Melee range, dealing full Damage."
  - id: hivemind_vanguard
    name: "Рой. Авангард"
    nameEn: "Hivemind: Vanguard"
    description: "В начале боя получает +1 к атаке за каждое другое уникальное существо Роя в армии. Убив отряд противника, генерирует очки концентрации: 2."
    descriptionEn: "At the start of battle, for each other unique Hive creature in the army, this creature’s Attack increases by 1. Whenever this creature kills an enemy, it generates 2 Focus Point(s)."
growth: 21
cost: 2123
source: https://www.olden-era.com/ru/units/pyroboros
