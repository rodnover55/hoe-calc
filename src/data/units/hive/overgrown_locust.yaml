tier: 2
grade: 2
upgradeOf: locust
image: units/hive/overgrown_locust.webp
stats:
  health: 16
  attack: 5
  defense: 4
  damageMin: 3
  damageMax: 5
  initiative: 7
  speed: 6
attackType: melee
flying: false
abilities:
  - id: hive_spawn
    name: "Порождение Роя"
    nameEn: "Hive Spawn"
    description: "Часть Роя, объединённого общим разумом и служащего могучему повелителю из‑за пределов постижимого. Диапазон боевого духа: от –5 до 5. Диапазон удачи: от –5 до 5. Погибшие порождения Роя можно поднять некромантией после боя."
    descriptionEn: "A part of a hivemind that serves a powerful lord from beyond. Morale range: –5 to 5. Luck range: –5 to 5. Fallen Hive Spawn count towards the power of Necromancy reanimation after battle."
  - id: melee_attack
    name: "Ближний бой"
    nameEn: "Melee Attack"
    description: "Может атаковать только отряды противника на соседних гексах. Провоцирует контратаку."
    descriptionEn: "Can only attack adjacent enemies. Provokes counterattacks."
  - id: double_strike
    name: "Двойной удар"
    nameEn: "Double Strike"
    description: "Атакует дважды."
    descriptionEn: "Strikes twice when performing attacks."
  - id: parry
    name: "Парирование"
    nameEn: "Parry"
    description: "Контратакует до атаки противника."
    descriptionEn: "When attacked, this creature’s counterattack strikes first."
  - id: hivemind_nest_protector
    name: "Рой. Защитник гнезда"
    nameEn: "Hivemind: Nest Protector"
    description: "В начале боя получает +1 к защите за каждое другое уникальное существо Роя в армии. При смерти генерирует очки концентрации: 2."
    descriptionEn: "At the start of battle, for each other unique Hive creature in the army, this creature’s Defense increases by 1. Upon death, this creature generates 2 Focus Point(s)."
growth: 4
cost: 35
