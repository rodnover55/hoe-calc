abilities:
  - id: hive_spawn
    name: "Порождение Роя"
    description: "Часть Роя, объединённого общим разумом и служащего могучему повелителю из‑за пределов постижимого. Диапазон боевого духа: от –5 до 5. Диапазон удачи: от –5 до 5. Погибшие порождения Роя можно поднять некромантией после боя."
  - id: melee_attack
    name: "Ближний бой"
    description: "Может атаковать только отряды противника на соседних гексах. Провоцирует контратаку."
  - id: apex_predator_ii
    name: "Высший хищник"
    description: "Наносит +50% урона целям того же и более высокого ранга."
  - id: rapid_assault
    name: "Стремительное нападение"
    description: "Проводит атаку в ближнем бою, не провоцирующую контратаку."
  - id: hivemind_nest_protector
    name: "Рой. Защитник гнезда"
    description: "В начале боя получает +1 к защите за каждое другое уникальное существо Роя в армии. При смерти генерирует очки концентрации: 2."
  - id: unholy_resillience
    name: "Нечестивое упорство"
    description: "Один раз за бой это существо попросту отказывается умирать. В отряде остается столько же существ, сколько было до смертельного удара."
  - id: terror
    name: "Ужас"
    description: "Противники более низкого ранга не могут атаковать его до конца раунда."
growth: 18
cost: 2030
