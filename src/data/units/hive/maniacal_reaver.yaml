id: maniacal_reaver
name: "Маньяк-раздиратель"
nameEn: "Maniacal Reaver"
faction: hive
tier: 5
grade: 1
upgradeOf: reaver
image: units/hive/maniacal_reaver.webp
stats:
  health: 45
  attack: 18
  defense: 12
  damageMin: 10
  damageMax: 40
  initiative: 12
  speed: 6
attackType: melee
flying: false
abilities:
  - id: hive_spawn
    name: "Порождение Роя"
    nameEn: "Hive Spawn"
    description: "Часть Роя, объединённого общим разумом и служащего могучему повелителю из‑за пределов постижимого. Диапазон боевого духа: от –5 до 5. Диапазон удачи: от –5 до 5. Погибшие порождения Роя можно поднять некромантией после боя."
    descriptionEn: "A part of a hivemind that serves a powerful lord from beyond. Morale range: –5 to 5. Luck range: –5 to 5. Fallen Hive Spawn count towards the power of Necromancy reanimation after battle."
  - id: melee_attack
    name: "Ближний бой"
    nameEn: "Melee Attack"
    description: "Может атаковать только отряды противника на соседних гексах. Провоцирует контратаку."
    descriptionEn: "Can only attack adjacent enemies. Provokes counterattacks."
  - id: apex_predator_ii
    name: "Высший хищник"
    nameEn: "Apex Predator"
    description: "Наносит +50% урона целям того же и более высокого ранга."
    descriptionEn: "Deals +50% Damage to targets of the same tier or higher."
  - id: rapid_assault
    name: "Стремительное нападение"
    nameEn: "Rapid Assault"
    description: "Проводит атаку в ближнем бою, не провоцирующую контратаку."
    descriptionEn: "Performs a Melee attack that does not provoke a counterattack."
  - id: hivemind_vanguard
    name: "Рой. Авангард"
    nameEn: "Hivemind: Vanguard"
    description: "В начале боя получает +1 к атаке за каждое другое уникальное существо Роя в армии. Убив отряд противника, генерирует очки концентрации: 2."
    descriptionEn: "At the start of battle, for each other unique Hive creature in the army, this creature’s Attack increases by 1. Whenever this creature kills an enemy, it generates 2 Focus Point(s)."
  - id: murderous_glee
    name: "Жажда резни"
    nameEn: "Murderous Glee"
    description: "Убив противника, это существо может сразу же походить снова. Срабатывает не более одного раза подряд, но боевой дух может повлиять на этот дополнительный ход."
    descriptionEn: "Upon killing an enemy, this creature immediately gains an additional turn. This ability cannot be used 2 times in a row, but Morale can affect this additional turn."
  - id: beelzebubs_blessing
    name: "Благословение Вельзевула"
    nameEn: "Beelzebub’s Blessing"
    description: "Это существо получает максимальные боевой дух и удачу до конца раунда."
    descriptionEn: "This creature gains maximum Morale and Luck until the end of the round."
growth: 12
cost: 1040
source: https://www.olden-era.com/ru/units/maniacal_reaver
