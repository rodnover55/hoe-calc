abilities:
  - id: hive_spawn
    name: "Порождение Роя"
    description: "Часть Роя, объединённого общим разумом и служащего могучему повелителю из‑за пределов постижимого. Диапазон боевого духа: от –5 до 5. Диапазон удачи: от –5 до 5. Погибшие порождения Роя можно поднять некромантией после боя."
  - id: melee_attack
    name: "Ближний бой"
    description: "Может атаковать только отряды противника на соседних гексах. Провоцирует контратаку."
  - id: apex_predator_ii
    name: "Высший хищник"
    description: "Наносит +50% урона целям того же и более высокого ранга."
  - id: rapid_assault
    name: "Стремительное нападение"
    description: "Проводит атаку в ближнем бою, не провоцирующую контратаку."
  - id: hivemind_vanguard
    name: "Рой. Авангард"
    description: "В начале боя получает +1 к атаке за каждое другое уникальное существо Роя в армии. Убив отряд противника, генерирует очки концентрации: 2."
  - id: murderous_glee
    name: "Жажда резни"
    description: "Убив противника, это существо может сразу же походить снова. Срабатывает не более одного раза подряд, но боевой дух может повлиять на этот дополнительный ход."
  - id: beelzebubs_blessing
    name: "Благословение Вельзевула"
    description: "Это существо получает максимальные боевой дух и удачу до конца раунда."
growth: 12
cost: 1040
