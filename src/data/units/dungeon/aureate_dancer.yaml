    name: "Выстрел"
    description: "Атакует отряд противника на любом расстоянии. Если на соседнем гексе находится отряд противника, вместо выстрела атакует в ближнем бою, нанося –50% урона. Если до цели более 3 гексов, наносит –10% урона за каждый лишний гекс (максимальный штраф: –50%)."
  - id: thousand_cuts_2
    name: "Тысяча порезов"
    description: "Каждая атака снижает защиту цели на 2 до конца боя. Эффект суммируется."
  - id: fighting_style_bouncing_glaives
    name: "Стиль боя. Проворные глефы"
    description: "Атакует две выбранные цели, нанося обеим –50% урона."
