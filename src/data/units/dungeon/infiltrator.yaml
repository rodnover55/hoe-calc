id: infiltrator
name: "Инфильтратор"
nameEn: "Infiltrator"
faction: dungeon
tier: 2
grade: 0
image: units/dungeon/infiltrator.webp
stats:
  health: 13
  attack: 6
  defense: 4
  damageMin: 3
  damageMax: 6
  initiative: 6
  speed: 5
attackType: melee
flying: false
abilities:
  - id: living
    name: "Живое существо"
    nameEn: "Living"
    description: "Разумный обитатель Джадама. Диапазон боевого духа: от –5 до 5. Диапазон удачи: от –3 до 3. Погибших живых существ можно поднять некромантией после боя."
    descriptionEn: "A fully sentient inhabitant of Jadame. Morale range: –5 to 5. Luck range: –3 to 3. Fallen Living creatures count towards the power of Necromancy reanimation after battle."
  - id: melee_attack
    name: "Ближний бой"
    nameEn: "Melee Attack"
    description: "Может атаковать только отряды противника на соседних гексах. Провоцирует контратаку."
    descriptionEn: "Can only attack adjacent enemies. Provokes counterattacks."
  - id: blink
    name: "Скачок"
    nameEn: "Blink"
    description: "Вместо обычного передвижения телепортируется, игнорируя препятствия и ловушки."
    descriptionEn: "Teleports directly to destination hex, ignoring obstacles and traps."
  - id: weak_spot
    name: "Слабое место"
    nameEn: "Weak Spot"
    description: "Удачные удары этого существа наносят +100% урона, а его максимально возможная удача повышается до 5."
    descriptionEn: "Lucky Strikes deal +100% Damage, and the maximum possible Luck is increased to 5."
  - id: fighting_style_hit_and_run
    name: "Стиль боя. Отступление"
    nameEn: "Fighting Style: Hit and Run"
    description: "После этой атаки это существо возвращается на исходную позицию, но она наносит –50% урона."
    descriptionEn: "This creature will return to its original position after attacking, but deal –50% Damage."
growth: 4
cost: 36
source: https://www.olden-era.com/ru/units/infiltrator
