    name: "Слабое место"
    description: "Удачные удары этого существа наносят +100% урона, а его максимально возможная удача повышается до 5."
  - id: fighting_style_hit_and_run
    name: "Стиль боя. Отступление"
    description: "После этой атаки это существо возвращается на исходную позицию, но она наносит –50% урона."
  - id: sharper_blade
    name: "Клинок всё острее"
    description: "Каждая атака этого существа повышает его удачу на 1."
  - id: veil_of_shadows
    name: "Завеса теней"
    description: "До конца раунда не может быть целью никаких воздействий."
