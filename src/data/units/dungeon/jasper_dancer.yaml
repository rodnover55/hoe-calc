abilities:
  - id: living
    name: "Живое существо"
    description: "Разумный обитатель Джадама. Диапазон боевого духа: от –5 до 5. Диапазон удачи: от –3 до 3. Погибших живых существ можно поднять некромантией после боя."
  - id: ranged_attack
    name: "Выстрел"
    description: "Атакует отряд противника на любом расстоянии. Если на соседнем гексе находится отряд противника, вместо выстрела атакует в ближнем бою, нанося –50% урона. Если до цели более 3 гексов, наносит –10% урона за каждый лишний гекс (максимальный штраф: –50%)."
  - id: thousand_cuts_1
    name: "Тысяча порезов"
    description: "Каждая атака снижает защиту цели на 1 до конца боя. Эффект суммируется."
  - id: fighting_style_bouncing_glaives
    name: "Стиль боя. Проворные глефы"
    description: "Атакует две выбранные цели, нанося обеим –50% урона."
  - id: draconic_blade
    name: "Драконий клинок"
    description: "Наносит двойной урон в ближнем бою."
  - id: swift_strike
    name: "Быстрый удар"
    description: "Атака не провоцирует контратаки."
