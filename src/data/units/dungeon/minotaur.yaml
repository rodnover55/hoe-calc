abilities:
  - id: magic_creature
    name: "Магическое существо"
    description: "Звероподобное создание. В Джадаме такие нередко обладают особыми силами, а прибывшие из других измерений — тем более. Диапазон боевого духа: от –3 до 3. Диапазон удачи: от –5 до 5. Погибших магических существ можно поднять некромантией после боя."
  - id: melee_attack
    name: "Ближний бой"
    description: "Может атаковать только отряды противника на соседних гексах. Провоцирует контратаку."
  - id: eager_for_battle
    name: "Рвётся в бой"
    description: "У этого существа всегда положительный боевой дух, а его максимально возможное значение повышается до 5. Шанс срабатывания боевого духа повышается на 5% за каждую единицу."
  - id: blood_for_blood
    name: "Око за око"
    description: "Каждый раз, когда это существо получает урон, его боевой дух повышается на 1."
  - id: fighting_style_grand_slam
    name: "Стиль боя. Рассекающий удар"
    description: "Атакует выбранный отряд и все отряды на двух гексах за ним, нанося им –50% урона."
