id: chthonic_hydra
name: "Хтоническая гидра"
nameEn: "Chthonic Hydra"
faction: dungeon
tier: 6
grade: 1
upgradeOf: hydra
image: units/dungeon/chthonic_hydra.webp
stats:
  health: 160
  attack: 24
  defense: 30
  damageMin: 25
  damageMax: 28
  initiative: 6
  speed: 5
attackType: melee
flying: false
abilities:
  - id: magic_creature
    name: "Магическое существо"
    nameEn: "Magic Creature"
    description: "Звероподобное создание. В Джадаме такие нередко обладают особыми силами, а прибывшие из других измерений — тем более. Диапазон боевого духа: от –3 до 3. Диапазон удачи: от –5 до 5. Погибших магических существ можно поднять некромантией после боя."
    descriptionEn: "A beast or beast‑like creature. Jadame’s beasts often have fantastical powers; denizens of other planes, even more so. Morale range: –3 to 3. Luck range: –5 to 5. Fallen Magic Creatures count towards the power of Necromancy reanimation after battle."
  - id: melee_attack
    name: "Ближний бой"
    nameEn: "Melee Attack"
    description: "Может атаковать только отряды противника на соседних гексах. Провоцирует контратаку."
    descriptionEn: "Can only attack adjacent enemies. Provokes counterattacks."
  - id: swift_strike
    name: "Быстрый удар"
    nameEn: "Swift Strike"
    description: "Атака не провоцирует контратаки."
    descriptionEn: "Enemies do not counterattack."
  - id: sweeping_strike
    name: "Размах"
    nameEn: "Sweeping Strike"
    description: "Наносит урон цели и любым существам на гексах по сторонам от неё."
    descriptionEn: "Deals Damage to the target and two adjacent hexes to its sides."
  - id: growing_teeth_ii
    name: "Отращивает зубы"
    nameEn: "Growing Teeth"
    description: "При получении урона это существо получает +2 к атаке до конца боя."
    descriptionEn: "Whenever this creature takes Damage, it gains 2 Attack until the end of the battle."
  - id: fighting_style_whirlwind_strike
    name: "Стиль боя. Круговой удар"
    nameEn: "Fighting Style: Whirlwind Strike"
    description: "Атакует все отряды противника на соседних с ней гексах, нанося им –50% урона."
    descriptionEn: "Hits all adjacent enemies, dealing –50% Damage to each."
  - id: poisonous_blood
    name: "Разъедающая кровь"
    nameEn: "Poisonous Blood"
    description: "Каждый раз, когда это существо получает урон, оно вынуждает противников на соседних с ним гексах наносить –25% урона до конца следующего раунда."
    descriptionEn: "Whenever this creature takes Damage, adjacent enemy creatures deal –25% Damage until the end of next round."
  - id: regeneration
    name: "Регенерация"
    nameEn: "Regeneration"
    description: "Полностью восстанавливает себе здоровье в начале каждого своего хода."
    descriptionEn: "Restores to full HP at the start of its turn."
  - id: all_heads_on_deck
    name: "Голов не счесть"
    nameEn: "All Heads on Deck"
    description: "При контратаке это существо использует свой стиль боя вместо обычной атаки."
    descriptionEn: "This creature’s counterattacks use its full Fighting Style effects."
growth: 30
cost: 2528
source: https://www.olden-era.com/ru/units/chthonic_hydra
