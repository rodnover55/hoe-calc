id: mistress_of_chains
name: "Повелительница цепей"
nameEn: "Mistress of Chains"
faction: schism
tier: 5
grade: 1
upgradeOf: concubus
image: units/schism/mistress_of_chains.webp
stats:
  health: 60
  attack: 20
  defense: 13
  damageMin: 14
  damageMax: 20
  initiative: 7
  speed: 4
attackType: ranged
flying: false
abilities:
  - id: ranged_attack
    name: "Выстрел"
    nameEn: "Ranged Attack"
    description: "Атакует отряд противника на любом расстоянии. Если на соседнем гексе находится отряд противника, вместо выстрела атакует в ближнем бою, нанося –50% урона. Если до цели более 3 гексов, наносит –10% урона за каждый лишний гекс (максимальный штраф: –50%)."
    descriptionEn: "Can attack enemies at any range. Replaced with a weaker Melee attack if an enemy is adjacent. –50% Melee Damage. Targets 3 or more hexes away take –10% Damage per hex (up to –50%)."
  - id: living
    name: "Живое существо"
    nameEn: "Living"
    description: "Разумный обитатель Джадама. Диапазон боевого духа: от –5 до 5. Диапазон удачи: от –3 до 3. Погибших живых существ можно поднять некромантией после боя."
    descriptionEn: "A fully sentient inhabitant of Jadame. Morale range: –5 to 5. Luck range: –3 to 3. Fallen Living creatures count towards the power of Necromancy reanimation after battle."
  - id: nimbleness
    name: "Проворство"
    nameEn: "Nimbleness"
    description: "Может стрелять, даже если на соседнем гексе есть отряд противника."
    descriptionEn: "Can perform Ranged attacks even while adjacent to an enemy."
  - id: earn_your_magic_dear_ii
    name: "Магию надо заслужить"
    nameEn: "Earn Your Magic, Dear"
    description: "Заклинания героя противника стоят +2 маны. Эффект не суммируется: действует только самый сильный из активных."
    descriptionEn: "Enemy hero’s spells cost +2 mana. This effect does not stack; only the strongest one is active."
  - id: handcuffs
    name: "Оковы"
    nameEn: "Handcuffs"
    description: "Запрещает выбранному отряду противника использовать активные способности. Кол‑во раундов: 2."
    descriptionEn: "Prevents target enemy creature from using active abilities. Duration: 2 round(s)."
  - id: earn_your_abilities_dear
    name: "Умения надо заслужить"
    nameEn: "Earn Your Abilities, Dear"
    description: "Каждый раз, когда это существо наносит урон, оно генерирует дополнительные очки концентрации: +3."
    descriptionEn: "Whenever this creature deals Damage, it generates +3 Focus Points."
  - id: hourglass
    name: "Песочные часы"
    nameEn: "Hourglass"
    description: "Запрещает герою противника использовать активные способности до конца раунда."
    descriptionEn: "Prevents the enemy hero from using active abilities until the end of the round."
growth: 13
cost: 1420
source: https://www.olden-era.com/ru/units/mistress_of_chains
