nameEn: "Ferocious Ra'Shoth"
faction: schism
tier: 1
grade: 2
upgradeOf: rashoth
image: units/schism/ferocious_rashoth.webp
stats:
  health: 10
  attack: 4
  defense: 4
  damageMin: 3
  damageMax: 3
  initiative: 5
  speed: 6
attackType: melee
