abilities:
  - id: flying
    name: "Полёт"
    nameEn: "Flying"
    description: "Передвигаясь, игнорирует препятствия и ловушки."
    descriptionEn: "Movement ignores obstacles and traps."
  - id: melee_attack
    name: "Ближний бой"
    nameEn: "Melee Attack"
    description: "Может атаковать только отряды противника на соседних гексах. Провоцирует контратаку."
    descriptionEn: "Can only attack adjacent enemies. Provokes counterattacks."
  - id: magic_creature
    name: "Магическое существо"
    nameEn: "Magic Creature"
    description: "Звероподобное создание. В Джадаме такие нередко обладают особыми силами, а прибывшие из других измерений — тем более. Диапазон боевого духа: от –3 до 3. Диапазон удачи: от –5 до 5. Погибших магических существ можно поднять некромантией после боя."
    descriptionEn: "A beast or beast‑like creature. Jadame’s beasts often have fantastical powers; denizens of other planes, even more so. Morale range: –3 to 3. Luck range: –5 to 5. Fallen Magic Creatures count towards the power of Necromancy reanimation after battle."
  - id: summoning_rite_ferocious_rashoth
    name: "Обряд призыва. Свирепые ра’шотхи"
    nameEn: "Summoning Rite: Ferocious Ra’Shoth"
    description: "Один раз за бой призывает отряд свирепых ра’шотхов на месте дружественного трупа. Призванный отряд получает 50% здоровья цели на начало боя, но не более [ текущая численность отряда‑призывателя ] существ(а). Эти существа остаются в армии героя после окончания боя."
    descriptionEn: "Once per battle, summons a stack of Ferocious Ra’Shoth in place of a friendly corpse. The summon has 50% HP of the corpse’s original stack and no more than [ current amount of summoners ] units. These creatures are permanent and remain after the battle."
  - id: sweeping_strike
    name: "Размах"
    nameEn: "Sweeping Strike"
    description: "Наносит урон цели и любым существам на гексах по сторонам от неё."
    descriptionEn: "Deals Damage to the target and two adjacent hexes to its sides."
growth: 4
cost: 33
