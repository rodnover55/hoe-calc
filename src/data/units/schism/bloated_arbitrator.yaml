id: bloated_arbitrator
name: "Раздувшийся арбитр"
nameEn: "Bloated Arbitrator"
faction: schism
tier: 6
grade: 2
upgradeOf: arbitrator
image: units/schism/bloated_arbitrator.webp
stats:
  health: 75
  attack: 28
  defense: 22
  damageMin: 22
  damageMax: 26
  initiative: 8
  speed: 5
attackType: ranged
flying: false
abilities:
  - id: ranged_attack
    name: "Выстрел"
    nameEn: "Ranged Attack"
    description: "Атакует отряд противника на любом расстоянии. Если на соседнем гексе находится отряд противника, вместо выстрела атакует в ближнем бою, нанося –50% урона. Если до цели более 3 гексов, наносит –10% урона за каждый лишний гекс (максимальный штраф: –50%)."
    descriptionEn: "Can attack enemies at any range. Replaced with a weaker Melee attack if an enemy is adjacent. –50% Melee Damage. Targets 3 or more hexes away take –10% Damage per hex (up to –50%)."
  - id: living
    name: "Живое существо"
    nameEn: "Living"
    description: "Разумный обитатель Джадама. Диапазон боевого духа: от –5 до 5. Диапазон удачи: от –3 до 3. Погибших живых существ можно поднять некромантией после боя."
    descriptionEn: "A fully sentient inhabitant of Jadame. Morale range: –5 to 5. Luck range: –3 to 3. Fallen Living creatures count towards the power of Necromancy reanimation after battle."
  - id: paradoxical_shots
    name: "Парадоксальный стрелок"
    nameEn: "Paradoxical Shots"
    description: "Штраф за дальность выстрелов интвертирован для этого существа. Если до цели более 3 гексов, его атаки наносят +10% урона за каждый лишний гекс (максимальный бонус: +50%). Если на соседнем гексе находится отряд противника, вместо выстрела атакует в ближнем бою, нанося +50% урона."
    descriptionEn: "Ranged penalties are reversed for this creature. Attacks deal +10% Damage per hex (up to a maximum of +50%) if the target is more than 3 hexes away. If the target is adjacent, performs a Melee attack, dealing +50% Damage."
  - id: power_of_the_abyss
    name: "Сила Бездны"
    nameEn: "Power of the Abyss"
    description: "Увеличивает запас маны своего героя на 20. Эффект не суммируется."
    descriptionEn: "Increases the hero’s maximum mana by 20. This effect does not stack."
  - id: slimy_touch
    name: "Склизкое прикосновение"
    nameEn: "Slimy Touch"
    description: "Атаки наносят +[ 4 × численность отряда ] чистого урона и снижают скорость и инициативу цели на 1 до конца раунда. Эффект не суммируется."
    descriptionEn: "Attacks deal +[ 4 × amount of units ] Pure Damage and lower the target’s Speed and Initiative by 1 until the end of round. This effect does not stack."
  - id: frozen_pages
    name: "Приказ. Поменяться местами"
    nameEn: "Frozen Pages"
    description: "Меняет местами любые два отряда, если они находятся в пределах 8 гексов друг от друга."
    descriptionEn: "Prevents the enemy hero from using the Spellbook until the end of the round. This effect does not stack."
growth: 22
cost: 2226
source: https://www.olden-era.com/ru/units/bloated_arbitrator
