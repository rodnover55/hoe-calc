abilities:
  - id: ranged_attack
    name: "Выстрел"
    description: "Атакует отряд противника на любом расстоянии. Если на соседнем гексе находится отряд противника, вместо выстрела атакует в ближнем бою, нанося –50% урона. Если до цели более 3 гексов, наносит –10% урона за каждый лишний гекс (максимальный штраф: –50%)."
  - id: living
    name: "Живое существо"
    description: "Разумный обитатель Джадама. Диапазон боевого духа: от –5 до 5. Диапазон удачи: от –3 до 3. Погибших живых существ можно поднять некромантией после боя."
  - id: paradoxical_shots
    name: "Парадоксальный стрелок"
    description: "Штраф за дальность выстрелов интвертирован для этого существа. Если до цели более 3 гексов, его атаки наносят +10% урона за каждый лишний гекс (максимальный бонус: +50%). Если на соседнем гексе находится отряд противника, вместо выстрела атакует в ближнем бою, нанося +50% урона."
  - id: power_of_the_abyss
    name: "Сила Бездны"
    description: "Увеличивает запас маны своего героя на 20. Эффект не суммируется."
  - id: slimy_touch
    name: "Склизкое прикосновение"
    description: "Атаки наносят +[ 4 × численность отряда ] чистого урона и снижают скорость и инициативу цели на 1 до конца раунда. Эффект не суммируется."
  - id: frozen_pages
    name: "Приказ. Поменяться местами"
    description: "Меняет местами любые два отряда, если они находятся в пределах 8 гексов друг от друга."
growth: 22
