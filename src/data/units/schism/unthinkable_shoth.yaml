    name: "Ближний бой"
    description: "Может атаковать только отряды противника на соседних гексах. Провоцирует контратаку."
  - id: magic_creature
    name: "Магическое существо"
    description: "Звероподобное создание. В Джадаме такие нередко обладают особыми силами, а прибывшие из других измерений — тем более. Диапазон боевого духа: от –3 до 3. Диапазон удачи: от –5 до 5. Погибших магических существ можно поднять некромантией после боя."
  - id: flying
    name: "Полёт"
    description: "Передвигаясь, игнорирует препятствия и ловушки."
  - id: frost
    name: "Обморожение"
    description: "Когда это существо атакует, его цель не генерирует концентрацию."
  - id: summoning_rite_unthinkable_shoth
    name: "Обряд призыва. Немыслимые шотхи"
    description: "Один раз за бой призывает отряд немыслимых шотхов на месте дружественного трупа. Призванный отряд получает 50% здоровья цели на начало боя, но не более [ текущая численность отряда‑призывателя ] существ(а). Эти существа остаются в армии героя после окончания боя."
  - id: black_ice_shard
    name: "Осколок Чёрного Льда"
    description: "Наносит выбраному отряду чистый урон в размере 100% от обычной атаки ([ 10—13 × численность отряда ])."
