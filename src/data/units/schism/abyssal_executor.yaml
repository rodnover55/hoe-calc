id: abyssal_executor
name: "Палач бездны"
nameEn: "Abyssal Executor"
faction: schism
tier: 7
grade: 2
upgradeOf: abyssal_envoy
image: units/schism/abyssal_executor.webp
stats:
  health: 250
  attack: 35
  defense: 35
  damageMin: 60
  damageMax: 60
  initiative: 10
  speed: 7
attackType: melee
flying: false
abilities:
  - id: melee_attack
    name: "Ближний бой"
    nameEn: "Melee Attack"
    description: "Может атаковать только отряды противника на соседних гексах. Провоцирует контратаку."
    descriptionEn: "Can only attack adjacent enemies. Provokes counterattacks."
  - id: magic_creature
    name: "Магическое существо"
    nameEn: "Magic Creature"
    description: "Звероподобное создание. В Джадаме такие нередко обладают особыми силами, а прибывшие из других измерений — тем более. Диапазон боевого духа: от –3 до 3. Диапазон удачи: от –5 до 5. Погибших магических существ можно поднять некромантией после боя."
    descriptionEn: "A beast or beast‑like creature. Jadame’s beasts often have fantastical powers; denizens of other planes, even more so. Morale range: –3 to 3. Luck range: –5 to 5. Fallen Magic Creatures count towards the power of Necromancy reanimation after battle."
  - id: pure_resistance
    name: "Абсолютное сопротивление"
    nameEn: "Absolute Resistance"
    description: "Неуязвимо для магического урона."
    descriptionEn: "Immune to all Magic Damage."
  - id: summoning_rite_executor
    name: "Обряд призыва. Каратели"
    nameEn: "Summoning Rite: Executor"
    description: "Один раз за бой призывает отряд карателей Бездны на месте дружественного трупа. Призванный отряд получает 50% здоровья цели на начало боя, но не более [ текущая численность отряда‑призывателя ] существ(а). Эти существа остаются в армии героя после окончания боя."
    descriptionEn: "Once per battle, summons a stack of Abyssal Executors in place of a friendly corpse. The summon has 50% HP of the corpse’s original stack and can’t have more than [ current amount of summoners ] units. These creatures are permanent and remain after the battle."
  - id: will_of_the_abyss
    name: "Воля Бездны"
    nameEn: "Will of the Abyss"
    description: "Получает возможность походить ещё несколько раз сразу после завершения хода: 1."
    descriptionEn: "Enables this creature to take 1 more turn(s) immediately after its first turn."
  - id: control_mind
    name: "Управление разумом"
    nameEn: "Control Mind"
    description: "Выбранный отряд противника теряет все возможности хода в этом раунде и пропускает ход."
    descriptionEn: "Target enemy creature loses all its possible turns and passes."
growth: 35
cost: 6060
