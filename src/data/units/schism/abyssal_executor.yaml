  - id: summoning_rite_executor
    name: "Обряд призыва. Каратели"
    description: "Один раз за бой призывает отряд карателей Бездны на месте дружественного трупа. Призванный отряд получает 50% здоровья цели на начало боя, но не более [ текущая численность отряда‑призывателя ] существ(а). Эти существа остаются в армии героя после окончания боя."
  - id: will_of_the_abyss
    name: "Воля Бездны"
    description: "Получает возможность походить ещё несколько раз сразу после завершения хода: 1."
  - id: control_mind
    name: "Управление разумом"
    description: "Выбранный отряд противника теряет все возможности хода в этом раунде и пропускает ход."
