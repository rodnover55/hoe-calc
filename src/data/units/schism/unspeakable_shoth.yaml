    description: "Когда это существо атакует, его цель не генерирует концентрацию."
  - id: summoning_rite_unspeakable_shoth
    name: "Обряд призыва. Невыразимые шотхи"
    description: "Один раз за бой призывает отряд невыразимых шотхов на месте дружественного трупа. Призванный отряд получает 50% здоровья цели на начало боя, но не более [ текущая численность отряда‑призывателя ] существ(а). Эти существа остаются в армии героя после окончания боя."
